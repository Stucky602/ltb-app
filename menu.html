<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#1a1a1a; --teal-dark:#1a3a3a; --teal-mid:#2d6a6a; --teal-light:#3fb8a0;
    --gold:#c9a84c; --cream:#e8e2d4; --card:#232a28; --dim:#9aa5a0; --body:#d8d2c4;
  }
  html,body { background:var(--bg); color:var(--cream); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
  body { max-width:620px; margin:0 auto; padding:max(28px,env(safe-area-inset-top)) 20px max(40px,env(safe-area-inset-bottom)); }
  .logo { width:88px; height:88px; border-radius:50%; display:block; margin:6px auto 12px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .brand { font-size:22px; font-weight:800; color:var(--gold); text-align:center; margin-bottom:2px; }
  .week { font-size:13px; color:var(--teal-light); text-align:center; font-style:italic; margin-bottom:18px; }
  .intro { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.55; color:var(--body); text-align:center; margin-bottom:22px; }
  .section-head { font-size:16px; font-weight:800; color:var(--gold); margin:24px 0 4px; padding-bottom:6px; border-bottom:2px solid var(--teal-mid); }
  .dish { padding:16px 0; border-bottom:1px solid #2d3a36; }
  .dish:last-child { border-bottom:none; }
  .dish-name { font-size:17px; font-weight:700; color:var(--cream); margin-bottom:5px; }
  .dish-desc { font-size:13.5px; line-height:1.55; color:var(--body); margin-bottom:8px; }
  .dish-meta { font-size:12px; line-height:1.5; color:var(--dim); font-style:italic; margin-bottom:4px; }
  .dish-spice { font-size:12px; color:#EF9F27; font-weight:600; margin-bottom:4px; }
  .dish-note { font-size:12px; color:var(--teal-light); font-style:italic; margin-bottom:4px; }
  .prices { margin-top:6px; }
  .price-row { display:flex; justify-content:space-between; align-items:flex-start; padding:3px 0; }
  .price-right { display:flex; flex-direction:column; align-items:flex-end; }
  .price-per-serving { font-size:11px; color:var(--dim); font-style:italic; margin-top:1px; }
  .price-label { font-size:13px; color:var(--cream); }
  .price-amt { font-size:14px; font-weight:700; color:var(--gold); white-space:nowrap; padding-left:12px; }
  .contains { font-size:11px; color:#8a928c; margin-top:7px; }
  .info-card { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:13px 15px; margin:14px 0; }
  .info-card h4 { color:var(--gold); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .info-card p { font-size:12.5px; line-height:1.5; color:var(--body); }
  .loop { background:var(--card); border:1px solid var(--gold); border-radius:12px; padding:15px; margin-top:24px; text-align:center; }
  .loop h4 { color:var(--gold); font-size:14px; font-weight:700; margin-bottom:6px; }
  .loop p { font-size:12.5px; line-height:1.55; color:var(--body); }
  .order-cta { display:block; text-align:center; background:var(--teal-light); color:#04342C; font-weight:700; font-size:15px; padding:15px; border-radius:12px; text-decoration:none; margin-top:22px; }
  .footer { margin-top:22px; font-size:11px; color:#6a726c; text-align:center; line-height:1.5; }
  .loading { text-align:center; color:var(--dim); padding:50px 0; font-style:italic; }
  .empty { text-align:center; color:var(--dim); padding:40px 0; font-style:italic; line-height:1.6; }
</style>
</head>

<script>
  var WORKER = "https://ltb-proxy.strickland-kevinj.workers.dev";
  var LIBRARY = {"_comment": "LTB Dish Library — canonical customer-facing copy. Keyed by exact dish name matching the app's ALL_DINNERS / ALWAYS_MENU names. The menu page and order form both read from the published subset of this. Edit copy here (or via chat) once; it persists forever.", "dinners": {"Shrimp or Tofu with Asparagus in Black Bean Sauce": {"desc": "Asparagus and your choice of protein in a savory sauce of soy, Shaoxing wine, fermented black beans, and aromatics. The fermented black beans give it a deep, funky-in-a-good-way backbone that makes it taste like it came out of a good Cantonese kitchen. Choose wild Texas Gulf shrimp, or tofu for a vegetarian version. When the Asian markets have good long beans, this shows up with long beans instead. Same sauce, swapped vegetable.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.", "contains": "Shellfish if ordering shrimp. Soy (tofu) if vegetarian. Gluten (soy sauce, Shaoxing wine).", "bagged": true}, "Thai Basil Chicken (Pad Krapow Gai)": {"desc": "Ground chicken hit hard and fast in the wok with garlic, asparagus, Thai basil, and a sauce of oyster sauce, soy, and fish sauce. Fragrant, savory, and a little spicy.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.", "contains": "Gluten (oyster sauce, soy sauce), Fish (fish sauce), Shellfish (oyster sauce).", "bagged": true}, "Saffron Pork Ragu": {"desc": "Ground pork slow-cooked with fennel, saffron, sherry, and tomato until it's deep and a little luxurious. The saffron does its quiet thing in the background and the whole thing comes together rich without being heavy.", "reheat": "Uncooked pasta included, cook fresh and let me know what pasta you'd like. Also excellent over polenta, though polenta isn't included. Want background heat? I can work a little chili into the sauce at no charge, just ask.", "contains": "Dairy.", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. Just ask.", "bagged": false}, "Mapo Eggplant": {"desc": "Chinese eggplant and ground chicken in a sauce built on doubanjiang and chili oil, cooked down until the eggplant goes silky and soaks up everything around it. Numbing, spicy, and savory all at once. Made for rice.", "reheat": "Comes in a container, not a bag. To reheat, warm in a large saucepan over medium, and add a splash of water if it looks a little thick. Uncooked rice included.", "contains": "Gluten (soy sauce, doubanjiang), Soy (doubanjiang).", "spice": "Spice level is about a 3 out of 5, and this one can't be dialed down.", "bagged": false}, "Gumbo": {"desc": "A proper roux-based gumbo, cooked dark and slow with chicken thighs, boudin, the holy trinity, and a good amount of patience. This is the one that takes all day, and it tastes like it. Made for rice.", "reheat": "The minimum batch size is the Large, so the Small option is only available when splitting a Large between orders. Uncooked rice included.", "contains": "Gluten (flour), check with me on boudin casing.", "bagged": false}, "Texas Gulf Shrimp or Tofu and Chinese Broccoli": {"desc": "Chinese broccoli (gai lan) and your choice of protein in a savory garlic sauce. Same idea as the black bean dish, different vegetable and a cleaner, garlic-forward sauce.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.", "contains": "Shellfish if ordering shrimp. Soy (tofu) if vegetarian. Gluten (soy sauce).", "bagged": true}, "Cumin Mushroom Noodles": {"desc": "Hand-pulled-style noodles with hard-seared mushrooms, cumin, and chili in a savory, slightly numbing sauce. Earthy and satisfying, with the mushrooms doing the heavy lifting where meat usually would.", "reheat": "Noodles and sauce travel separately. Cook the noodles fresh and toss with the warmed sauce.", "contains": "Gluten (noodles, soy sauce), Soy.", "bagged": false}, "Stir Fried Long Beans with Ground Pork": {"desc": "Blistered long beans and ground pork in a savory, slightly sweet sauce with garlic and a little heat. Classic dry-fried texture on the beans, deeply savory throughout.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.", "contains": "Gluten (soy sauce), Soy.", "bagged": true}, "Pasta with Red Sauce": {"desc": "A long-simmered tomato sauce with garlic, herbs, and good olive oil. Simple, honest, and built on a base that's cooked low and slow until it's sweet and deep.", "reheat": "Uncooked pasta included, cook fresh. Warm the sauce gently on the stove.", "contains": "May contain Dairy. Gluten if including pasta.", "note": "Happy to grab you a block of good parm at cost to grate fresh over the top. Just ask.", "bagged": false}, "Bolognese": {"desc": "A proper Bolognese, cooked low and slow with a soffritto base, a mix of meats, milk, and wine until it's rich and velvety. This is one of the slow-cooked exceptions, and it tastes like the hours that went into it.", "reheat": "Uncooked pasta included, cook fresh. Warm the sauce gently, adding a splash of pasta water to loosen.", "contains": "Dairy. Gluten if including pasta.", "note": "Happy to grab you a block of good parm at cost to grate fresh over the top. Just ask.", "bagged": false}, "Boeuf Bourguignon (Beef Stew)": {"desc": "Beef braised low and slow in red wine with mushrooms, pearl onions, and bacon until the meat goes fork-tender and the sauce turns glossy and deep. A cold-weather classic that reheats beautifully.", "reheat": "Comes in a container. Warm gently on the stove over medium-low. Great over mashed potatoes, egg noodles, or crusty bread.", "contains": "Gluten (flour), may contain Dairy.", "bagged": false}, "Brunswick Stew": {"desc": "A thick Southern stew with pulled meats, corn, lima beans, and tomato, simmered down until everything melds. Hearty, smoky, and a little sweet.", "reheat": "Comes in a container. Warm gently on the stove, adding a splash of water if it looks thick.", "contains": "May vary, ask for specifics.", "bagged": false}, "Chili": {"desc": "A deep, slow-built chili with a real chile backbone, not just heat. Rich, meaty, and better the next day.", "reheat": "Comes in a container. Warm gently on the stove over medium.", "contains": "May contain Dairy. Ask for specifics.", "bagged": false}, "Indian Style Curry": {"desc": "A rotating curry built on a base of toasted whole spices, aromatics, and tomato or coconut depending on the week. Ask what's on deck, it changes based on what's looking good.", "reheat": "Comes in a container. Warm gently on the stove. Uncooked rice included.", "contains": "May contain Dairy. Ask for specifics.", "bagged": false}, "Tex-Mex Kit": {"desc": "A build-your-own kit with seasoned protein, warm components, and the fixings to assemble tacos, bowls, or whatever you're in the mood for at home.", "reheat": "Components travel separately with assembly notes. Warm the protein gently before building.", "contains": "May contain Dairy, Gluten. Ask for specifics.", "bagged": false}}, "addons": {"Fresh Cut Pineapple": {"desc": "Freshly cut and ready to eat.", "contains": ""}, "Seasonal Cantaloupe": {"desc": "Seasonal melon, cut and ready to eat. Whatever's best that week goes in the container.", "contains": ""}, "Queso": {"desc": "Slow-developed flavors that put store-bought to shame. Sold by the pint. Freezes very well. Testimonial from a friend: \"This is the best drunk food I've ever had...it literally saved my life.\"", "contains": "Dairy.", "spice": "No Heat, Medium (1 habanero), or Hot (2 habaneros). Extra heat available on request."}, "Pickled Onions or Carrots": {"desc": "Bright, tangy, and the perfect finishing touch on just about anything. Made in-house, packed in a pint mason jar.", "contains": ""}, "Chili Oil": {"desc": "House-made chili oil with five spice, Sichuan peppercorns, toasted sesame, star anise, and fresh ginger. Put it on everything.", "contains": ""}, "Thyme or Lavender Syrup": {"desc": "Simple syrup steeped with fresh thyme or lavender. Perfect for cocktails, lemonade, or sparkling water.", "contains": ""}, "Vanilla Syrup": {"desc": "Rich vanilla syrup made with house-made vanilla extract and vanilla beans. The good stuff.", "contains": ""}, "Vanilla Lavender Syrup": {"desc": "The best of both worlds, vanilla and lavender together. Elegant and versatile.", "contains": ""}, "Chocolate Chip Cookies": {"desc": "Made with two kinds of chocolate for real depth of flavor. Brown butter, molasses, and a touch of patience.", "contains": "Gluten, Dairy, Eggs.", "note": "Yes, the premium ones are expensive. But have you seen chocolate prices lately? That Valrhona is $30 a pound. It's worth it."}, "Peanut Butter Fudge": {"desc": "Grandma's recipe. That's all you need to know.", "contains": "Dairy, Peanuts."}}, "static": {"intro": "Everything is cooked ahead and made to reheat at home. A few dishes arrive sealed in a bag because they reheat better that way; the rest come in containers. Order by Sunday for delivery the following Wednesday.", "baggedNote": "A few dishes arrive fully cooked but sealed in a bag instead of a container, not because it's fancy, just because it reheats better. To reheat: bring a separate pot of water to a gentle simmer, drop the bag in, and let it sit a few minutes while you handle everything else, then cut it open and plate. Microwave or stovetop still work fine if you'd rather.", "readyToFinish": "These come cooked ahead and finished by you at home: a quick sear on the proteins, a fast reheat on the vegetables. A few minutes of hands-on work, and the result is worth it.", "loop": "Return your clean mason jars or meal containers at delivery and save on your next order. Swap or return a mason jar: $2.00 off that item. Return a meal container: $1.00 off your order per container returned. Stack as many as you have. All prices are all-in (tax included).", "whatIsSousVide": "Sous vide (pronounced \"soo veed,\" French for \"under vacuum\") is a cooking method where food is sealed in an airtight bag and cooked in a precisely temperature-controlled water bath. Because the water stays at one exact temperature the whole time, the food cooks perfectly and evenly all the way through, with no overcooked edges and no undercooked center. For this menu, that means your protein arrives already cooked to the perfect point, and all you have to do is add a quick sear for color and crust, or a fast reheat for vegetables.", "bagNote": "All bags used for these items are BPA-free and food-safe for sous vide cooking and freezer storage. Once you're done, feel free to toss them. Trying to cut down on single-use plastic? There's a reusable option for regulars, so ask about it.", "seasoningNote": "Every bag, proteins and vegetables alike, is seasoned with salt, sugar, fresh thyme, and butter before cooking. The sugar isn't there to make things sweet. On the proteins it works with the salt to form a light dry brine that helps them hold moisture and brown better, and on the vegetables it draws out their natural sweetness. Contains: Dairy (butter).", "finishingProtein": "Remove the protein from the bag and pat it very dry with a paper towel — this is the key to a great crust. Get a pan blazing hot with a neutral, high-smoke-point oil, then sear hard on each side just until deeply browned. Thicker cuts (ribeye, NY strip, filet, pork tenderloin) benefit from sitting out on the counter for 15-20 minutes before searing. All steaks are cooked to 131°F (medium rare), pork tenderloin to 140°F (medium).", "finishingVeg": "Place the sealed bag in a pot of simmering water for a few minutes to reheat. Once warmed through, carefully cut the bag open and pour out the liquid. Either plate the vegetables as-is, or pour that liquid into a small pan and reduce it into a glaze, then spoon it back over.", "butterAdd": "Any sous vide protein can come with a container of whipped lemon, garlic, and herb butter to melt over the top right after searing. Highly recommended on the steaks and the pork. + $2.00 per container."}, "bag": {"Ribeye": {"desc": "The well-marbled one. All that fat means it stays rich and tender even after a quick sear at home.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan with a neutral oil. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "NY Strip": {"desc": "Leaner than the ribeye but still plenty beefy. A good middle ground if you want flavor without all the fat.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Filet Mignon": {"desc": "The most tender cut there is. Mild and buttery, so it leans on the sear and seasoning for flavor.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Pork Tenderloin": {"desc": "Lean, mild, and quick to cook, the tenderloin takes really well to a hard sear. Cooked to a perfect 140°F medium so it stays juicy, not dried out the way pork usually ends up. Sold per loin, about 1.25 pounds each.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan. Cooked to 140°F (medium), in its own batch separate from the steaks.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Chicken Breast": {"desc": "Cooked sous vide so it's actually juicy all the way through, then it just needs a quick sear at home for color. No more dry, overcooked chicken breast.", "reheat": "Pat very dry, sear in a hot pan until golden on each side. Thinner than steaks so it can go straight from the fridge to the pan.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Baby Gold Potatoes": {"desc": "Tender baby gold potatoes, seasoned and ready to glaze. Two servings per bag.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "note": "Single-serving portions available by request."}, "Carrots": {"desc": "Sweet, tender carrots, seasoned and ready to glaze. Two servings per bag.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "note": "Single-serving portions available by request."}, "Whipped Lemon Garlic Herb Butter": {"desc": "Whipped lemon, garlic, and herb butter to melt over the top right after searing. It turns a good piece of meat into something that tastes like it came out of a restaurant kitchen. Highly recommended on the steaks and the pork.", "reheat": "Let come to room temperature or microwave briefly. Melt over the protein right after the sear.", "contains": "Dairy.", "bagCharge": false}}};

  function money(n){ return "$" + (Math.round(n*100)/100).toFixed(2).replace(/\.00$/,""); }

  function parseServings(label) {
    var m = label.match(/~(\d+)-(\d+)/);
    if (m) return (parseInt(m[1]) + parseInt(m[2])) / 2;
    m = label.match(/~(\d+)/);
    if (m) return parseInt(m[1]);
    return null;
  }
  function fmtLabel(label) {
    if (/~\d/.test(label) && !/serving/.test(label)) {
      return label.replace(/(~[\d]+-?[\d]*)/, '$1 servings');
    }
    return label;
  }
  function perServing(price, label) {
    var s = parseServings(label);
    if (!s || s <= 0) return null;
    return '~$' + (price / s).toFixed(2).replace(/\.00$/, '') + '/serving';
  }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  function lookupCopy(name, kind){
    var pool = kind === "addon" ? LIBRARY.addons : LIBRARY.dinners;
    return pool[name] || null;
  }

  function priceRows(dish){
    var html = '<div class="prices">';
    if (dish && dish.perLb) {
      html += '<div class="price-row"><span class="price-label">By weight</span><span class="price-amt">'+money(dish.pricePerLb)+'/lb + $1.50 bag</span></div>';
    } else {
      ((dish && dish.variants)||[]).forEach(function(v){
        var ps = perServing(v.price, v.label);
        html += '<div class="price-row"><span class="price-label">'+esc(fmtLabel(v.label))+'</span><div class="price-right"><span class="price-amt">'+money(v.price)+'</span>'+(ps ? '<span class="price-per-serving">'+ps+'</span>' : '')+'</div></div>';
      });
    }
    return html + '</div>';
  }

  function lookupBagCopy(name){
    return (LIBRARY.bag || {})[name] || null;
  }

  function renderDish(dish, kind){
    var copy = kind === 'bag' ? (lookupBagCopy(dish.name) || {}) : (lookupCopy(dish.name, kind) || {});
    var html = '<div class="dish"><div class="dish-name">'+esc(dish.name)+'</div>';
    if (copy.desc) html += '<div class="dish-desc">'+esc(copy.desc)+'</div>';
    if (copy.reheat) html += '<div class="dish-meta">'+esc(copy.reheat)+'</div>';
    if (copy.spice) html += '<div class="dish-spice">Spice: '+esc(copy.spice)+'</div>';
    if (copy.note) html += '<div class="dish-note">'+esc(copy.note)+'</div>';
    if (copy.bagCharge) html += '<div class="dish-meta">+ $1.50 per bag for seasoning and packaging</div>';
    html += priceRows(dish);
    if (copy.contains) html += '<div class="contains">Contains: '+esc(copy.contains)+'</div>';
    return html + '</div>';
  }

  function render(config){
    if (config.weekLabel) document.getElementById("weekLabel").textContent = config.weekLabel;
    var dishes = config.dishes || [];
    var addons = config.addons || [];
    var bag = config.bag || [];

    if (dishes.length === 0 && addons.length === 0 && bag.length === 0){
      document.getElementById("content").innerHTML =
        '<div class="empty">No menu is published right now.<br>Check back Thursday, or reach out directly.</div>';
      return;
    }

    var html = '<div class="intro">'+esc(LIBRARY.static.intro)+'</div>';

    // Dinners
    if (dishes.length){
      html += '<div class="section-head">This Week\'s Dinners</div>';
      var anyBagged = false;
      dishes.forEach(function(d){
        html += renderDish(d, "dinner");
        var copy = lookupCopy(d.name, "dinner");
        if (copy && copy.bagged) anyBagged = true;
      });
      if (anyBagged){
        html += '<div class="info-card"><h4>A Note On Bagged Dishes</h4><p>'+esc(LIBRARY.static.baggedNote)+'</p></div>';
      }
    }

    // Ready to Finish (bag category)
    if (bag.length){
      html += '<div class="section-head">Ready to Finish</div>';
      html += '<div class="info-card"><p>'+esc(LIBRARY.static.readyToFinish)+'</p></div>';
      // Info cards for sous vide
      if (LIBRARY.static.whatIsSousVide) html += '<div class="info-card"><h4>What Is Sous Vide?</h4><p>'+esc(LIBRARY.static.whatIsSousVide)+'</p></div>';
      if (LIBRARY.static.seasoningNote) html += '<div class="info-card"><h4>A Note On Seasoning</h4><p>'+esc(LIBRARY.static.seasoningNote)+'</p></div>';
      if (LIBRARY.static.finishingProtein) html += '<div class="info-card"><h4>Finishing Your Protein</h4><p>'+esc(LIBRARY.static.finishingProtein)+'</p></div>';
      if (LIBRARY.static.butterAdd) html += '<div class="info-card"><h4>Optional: Whipped Lemon Garlic Herb Butter</h4><p>'+esc(LIBRARY.static.butterAdd)+'</p></div>';
      if (LIBRARY.static.finishingVeg) html += '<div class="info-card"><h4>Finishing Your Vegetables</h4><p>'+esc(LIBRARY.static.finishingVeg)+'</p></div>';
      bag.forEach(function(d){ html += renderDish(d, "bag"); });
    }

    // Add-ons & Extras
    if (addons.length){
      html += '<div class="section-head">Add-Ons &amp; Extras</div>';
      addons.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // The Loop
    html += '<div class="loop"><h4>The Loop</h4><p>'+esc(LIBRARY.static.loop)+'</p></div>';

    // Order CTA
    html += '<a class="order-cta" href="form.html">Place Your Order →</a>';
    html += '<div class="footer">Lettuce, Turnip, The Beet · Friends-only meal prep · Austin, TX</div>';

    document.getElementById("content").innerHTML = html;
  }

  fetch(WORKER + "/config")
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(){
      document.getElementById("content").innerHTML =
        '<div class="empty">Could not load the menu right now.<br>Please try again in a moment.</div>';
    });
</script>
</body>
</html>
