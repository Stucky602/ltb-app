<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#1a1a1a; --teal-dark:#1a3a3a; --teal-mid:#2d6a6a; --teal-light:#3fb8a0;
    --gold:#c9a84c; --cream:#e8e2d4; --card:#232a28; --dim:#9aa5a0; --body:#d8d2c4;
  }
  html,body { background:var(--bg); color:var(--cream); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
  body { max-width:620px; margin:0 auto; padding:max(28px,env(safe-area-inset-top)) 20px max(40px,env(safe-area-inset-bottom)); }
  .logo { width:88px; height:88px; border-radius:50%; display:block; margin:6px auto 12px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .brand { font-size:22px; font-weight:800; color:var(--gold); text-align:center; margin-bottom:2px; }
  .week { font-size:13px; color:var(--teal-light); text-align:center; font-style:italic; margin-bottom:18px; }
  .intro { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.55; color:var(--body); text-align:center; margin-bottom:22px; }
  .section-head { font-size:16px; font-weight:800; color:var(--gold); margin:24px 0 4px; padding-bottom:6px; border-bottom:2px solid var(--teal-mid); }
  .section-sub-head { font-size:14px; font-weight:700; color:var(--teal-light); margin:20px 0 4px; padding-bottom:4px; border-bottom:1px solid var(--teal-mid); }
  .veg-entry { padding:10px 0; border-bottom:1px solid #2d3a36; }
  .veg-entry:last-child { border-bottom:none; }
  .veg-name { font-size:15px; font-weight:600; color:var(--cream); }
  .veg-note { font-size:13px; color:var(--dim); font-style:italic; }
  .dish { padding:16px 0; border-bottom:1px solid #2d3a36; }
  .dish:last-child { border-bottom:none; }
  .dish-name { font-size:17px; font-weight:700; color:var(--cream); margin-bottom:5px; }
  .diet-filter { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:14px 0 4px; }
  .diet-filter-label { font-size:13px; color:var(--dim); font-weight:600; }
  .diet-chip { background:#2a2f2d; color:#c8cfc9; border:1px solid #3a4441; border-radius:16px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .diet-chip.on { background:var(--teal-light); color:#1a1a1a; border-color:var(--teal-light); }
  .diet-chip.clear { background:none; border-color:#3a4441; color:var(--dim); font-weight:600; }
  .diet-tag { display:inline-block; font-size:11px; font-weight:700; color:#1a1a1a; background:var(--teal-light); border-radius:5px; padding:2px 7px; margin-bottom:6px; }
  .dish-desc { font-size:13.5px; line-height:1.55; color:var(--body); margin-bottom:8px; }
  .dish-meta { font-size:12px; line-height:1.5; color:var(--dim); font-style:italic; margin-bottom:4px; }
  .dish-spice { font-size:12px; color:#EF9F27; font-weight:600; margin-bottom:4px; }
  .dish-note { font-size:12px; color:var(--teal-light); font-style:italic; margin-bottom:4px; }
  .prices { margin-top:6px; }
  .price-row { display:flex; justify-content:space-between; align-items:flex-start; padding:3px 0; }
  .price-right { display:flex; flex-direction:column; align-items:flex-end; }
  .price-per-serving { font-size:11px; color:var(--dim); font-style:italic; margin-top:1px; }
  .price-label { font-size:13px; color:var(--cream); }
  .price-amt { font-size:14px; font-weight:700; color:var(--gold); white-space:nowrap; padding-left:12px; }
  .contains { font-size:11px; color:#8a928c; margin-top:7px; }
  .pairings { margin-top:8px; padding:8px 10px; background:rgba(63,184,160,0.06); border-left:2px solid var(--teal-mid); border-radius:0 8px 8px 0; }
  .pairings-head { font-size:10px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:var(--teal-light); margin-bottom:4px; }
  .pairing-row { font-size:12px; line-height:1.5; color:var(--body); }
  .pairing-row b { color:var(--cream); font-weight:600; }
  .info-card { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:13px 15px; margin:14px 0; }
  .info-card h4 { color:var(--gold); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .info-card p { font-size:12.5px; line-height:1.5; color:var(--body); }
  .loop { background:var(--card); border:1px solid var(--gold); border-radius:12px; padding:15px; margin-top:24px; text-align:center; }
  .loop h4 { color:var(--gold); font-size:14px; font-weight:700; margin-bottom:6px; }
  .loop p { font-size:12.5px; line-height:1.55; color:var(--body); }
  .order-cta { display:block; text-align:center; background:var(--teal-light); color:#04342C; font-weight:700; font-size:15px; padding:15px; border-radius:12px; text-decoration:none; margin-top:22px; }
  .request-box { margin-top:22px; padding:16px; background:rgba(63,184,160,0.06); border:1px solid var(--teal-mid); border-radius:12px; }
  .request-head { font-size:14px; font-weight:800; color:var(--teal-light); letter-spacing:0.3px; margin-bottom:4px; }
  .request-sub { font-size:12.5px; color:#8a928c; line-height:1.5; margin-bottom:10px; }
  .request-box select, .request-box input { width:100%; box-sizing:border-box; padding:10px; margin-bottom:8px; border-radius:8px; border:1px solid var(--teal-mid); background:#0e1a17; color:var(--body); font-size:14px; }
  .request-box button { width:100%; padding:11px; border:none; border-radius:8px; background:var(--teal-mid); color:#04342C; font-weight:700; font-size:14px; cursor:pointer; }
  .request-box button:disabled { opacity:0.5; cursor:default; }
  .request-done { font-size:12.5px; margin-top:8px; min-height:16px; }
  .request-done.ok { color:var(--teal-light); }
  .request-done.err { color:#d98a7a; }
  .pipeline-cta { display:block; text-align:center; color:var(--teal-light); font-size:14px; padding:14px; margin-top:13px; text-decoration:none; border:1px solid var(--teal-mid); border-radius:12px; }
  .footer { margin-top:22px; font-size:11px; color:#6a726c; text-align:center; line-height:1.5; }
  .loading { text-align:center; color:var(--dim); padding:50px 0; font-style:italic; }
  .empty { text-align:center; color:var(--dim); padding:40px 0; font-style:italic; line-height:1.6; }
  .sticky-back { position:fixed; top:max(14px,env(safe-area-inset-top)); left:14px; z-index:999; background:var(--teal-dark); border:1px solid var(--teal-mid); border-radius:10px; padding:8px 14px; color:var(--teal-light); font-size:13px; font-weight:600; text-decoration:none; box-shadow:0 2px 12px rgba(0,0,0,0.4); }
</style>
</head>

<script>
  var WORKER = "https://ltb-proxy.strickland-kevinj.workers.dev";
  var LIBRARY = {"_comment": "LTB Dish Library — canonical customer-facing copy. Keyed by exact dish name matching the app's ALL_DINNERS / ALWAYS_MENU names. The menu page and order form both read from the published subset of this. Edit copy here (or via chat) once; it persists forever.", "dinners": {"Shrimp or Tofu with Asparagus in Black Bean Sauce": {"desc": "Asparagus and your choice of Texas Gulf shrimp or tofu in a savory sauce of soy, Shaoxing wine, fermented black beans, and aromatics. The fermented black beans give it a deep, funky-in-a-good-way backbone that makes it taste like it came out of a good Cantonese kitchen.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.", "contains": "Shellfish if ordering shrimp. Soy (tofu) if vegetarian. Gluten (soy sauce, Shaoxing wine).", "bagged": true, "pairings": [{"id": "jasmine_tea", "drink": "Jasmine tea", "why": "the Cantonese table default; light against a salty ferment"}, {"id": "riesling", "drink": "Dry Riesling or Grüner Veltliner", "why": "acid and minerality with shrimp, restraint with the black beans"}, {"id": "lager", "drink": "Crisp lager", "why": "the safe and correct answer with a salty stir-fry"}, {"id": "oolong", "drink": "Oolong, iced", "why": "more body than jasmine when the sauce runs deep"}, {"id": "sparkling_water", "drink": "Sparkling water with lime", "why": "reset button; the sauce is the star"}]}, "Thai Basil Chicken (Pad Krapow Gai)": {"desc": "Ground chicken hit hard and fast in the wok with garlic, asparagus, Thai basil, and a sauce of oyster sauce, soy, and fish sauce. Fragrant, savory, and spicy. Spice level is customizable 1-5, just let me know when you order. A fried egg on top is a great move — not included, but highly recommended.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.", "contains": "Gluten (oyster sauce, soy sauce), Fish (fish sauce), Shellfish (oyster sauce), Soy (soy sauce).", "bagged": true, "pairings": [{"id": "thai_iced_tea", "drink": "Thai iced tea", "why": "the classic cooling answer; creamy sweetness against chile and fish sauce"}, {"id": "lager", "drink": "Singha or Chang", "why": "Thai lager, made for exactly this plate"}, {"id": "riesling", "drink": "Off-dry Riesling", "why": "sweetness where the bird's-eye chiles bite"}, {"id": "limeade", "drink": "Limeade", "why": "tart and cold; the dish's own lime logic in a glass"}, {"id": "coconut_water", "drink": "Coconut water", "why": "cooling without competing with the basil"}]}, "Saffron Pork Ragu": {"desc": "Ground pork slow-cooked with fennel, saffron, sherry, and tomato until it's deep and a little luxurious. The saffron does its quiet thing in the background and the whole thing comes together rich without being heavy.", "reheat": "Uncooked pasta included, cook fresh and let me know what pasta you'd like. Also excellent over polenta — order the polenta variant and it comes in a bag, ready to reheat. Want background heat? I can work a little chili into the sauce at no charge, just ask.", "contains": "Dairy. Gluten if including pasta.", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. There's a spot for it on the order form.", "bagged": false, "pairings": [{"id": "vermentino", "drink": "Vernaccia or Vermentino", "why": "saffron likes a golden-toned white with body"}, {"id": "sangiovese", "drink": "Sangiovese", "why": "if red, the acid-first Italian answer to pork and tomato"}, {"id": "rose", "drink": "Dry rosé", "why": "between the two, and right in the saffron register"}, {"id": "sparkling_water", "drink": "Sparkling water with orange", "why": "saffron and orange are old friends"}, {"id": "chamomile_tea", "drink": "Chamomile iced tea", "why": "odd on paper, but chamomile's honeyed hay sits next to saffron surprisingly well"}]}, "Mushroom Ragu": {"desc": "Four kinds of mushroom doing the work of meat. Dried porcini, oyster, king oyster, and shiitake, built into a deep ragu with soffritto, marsala, a little cream, and good parm, tossed with egg pappardelle. Heads up on the price: this one is loaded with specialty mushrooms and fresh egg pasta, and there is no cheap filler hiding in here, so it costs what it costs. You can sub polenta for the pasta at no extra charge.", "reheat": "Comes in a container, ready to go. Empty the sauce into a saucepan and warm it over medium-low, stirring now and then, while you boil your pasta in lightly salted water. Once the pasta is cooked and drained, toss it with the sauce and a splash of the pasta water to loosen it, then finish with a little parm if you have it. Ordering the polenta version instead? The polenta comes sealed in a separate sous vide bag, so reheat it in simmering water for a few minutes, then cut it open, spoon it out, and top with the warmed sauce.", "contains": "Dairy (cream, parmesan), Gluten (pasta), Egg (pasta).", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. There's a spot for it on the order form.", "spotlight": true, "bagged": false, "pairings": [{"id": "pinot_noir", "drink": "Pinot Noir", "why": "earth with earth; the mushroom wine"}, {"id": "nebbiolo", "drink": "Nebbiolo", "why": "tar and roses over deep umami, if you want more structure"}, {"id": "barbera", "drink": "Porcini-friendly Barbera", "why": "acid for the tomato in the base, no tannin fight"}, {"id": "barley_tea", "drink": "Roasted barley tea, cold", "why": "toasted depth that mirrors seared mushrooms, no sugar"}, {"id": "mushroom_broth", "drink": "Mushroom broth sipper, warm", "why": "fully in the pot's own register; more of the same, on purpose"}]}, "Pork with Mustard Tarragon Cream Sauce": {"desc": "Sous vide pork tenderloin, seared and sliced, over fresh egg taglierini in a mustard, white wine, and tarragon cream sauce. Filed under German for the mustard-and-cream backbone, but the fresh egg pasta underneath pulls it toward Italian, so it lives happily in between. The classic move here would be spätzle, but spätzle does not reheat the way I want it to, so we're using an egg taglierini as a substitute.", "reheat": "Three parts: the pork in a sealed bag, the sauce in a container, and the taglierini to cook fresh. For the pork, pat it very dry, then sear hard on each side in a blazing-hot pan just until deeply browned on each side. Cut it into half-inch to one-inch medallions after searing. Warm the sauce in a saucepan over medium-low, stirring now and then, while you boil your pasta in lightly salted water. Once the pasta is cooked and drained, toss it with the sauce, then plate with the pork on top.", "contains": "Dairy (cream, butter, in seasoning bag), Gluten (pasta), Egg (pasta), Mustard.", "bagged": false, "pairings": [{"id": "chardonnay", "drink": "Chardonnay, lightly oaked", "why": "cream sauce's oldest companion; body meeting body"}, {"id": "riesling", "drink": "Dry Riesling", "why": "acid to cut cream, fruit to sit with mustard"}, {"id": "hard_cider", "drink": "Hard apple cider", "why": "Normandy logic: pork, cream, and apples belong together"}, {"id": "sparkling_apple", "drink": "Sparkling apple juice", "why": "same logic, zero proof"}, {"id": "pinot_noir", "drink": "Pinot Noir", "why": "if red, the one light enough for a cream sauce"}]}, "Mapo Eggplant": {"desc": "Chinese eggplant and ground chicken in a sauce built on doubanjiang and chili oil, cooked down until the eggplant goes silky and soaks up everything around it. Numbing, spicy, and savory all at once. Made for rice.", "reheat": "Comes in a container, not a bag. To reheat, warm in a large saucepan over medium, and add a splash of water if it looks a little thick. Uncooked rice included.", "contains": "Gluten (soy sauce, doubanjiang), Soy (doubanjiang), Sesame (house chili oil).", "spice": "Spice level is about a 3 out of 5, and this one can't be dialed down.", "bagged": false, "pairings": [{"id": "suanmeitang", "drink": "Suanmeitang", "why": "Chengdu's own answer to mala; sour plum against numbing heat"}, {"id": "jasmine_tea", "drink": "Jasmine tea", "why": "floral and cooling between bites of doubanjiang"}, {"id": "riesling", "drink": "Off-dry Riesling", "why": "sweetness is the wine move against Sichuan heat; tannin is the mistake"}, {"id": "lager", "drink": "Cold light lager", "why": "neutral, cold, and honest about what it's for"}, {"id": "coconut_water", "drink": "Coconut water", "why": "quietly effective against capsaicin, and doesn't add another flavor"}]}, "Gumbo": {"desc": "A proper roux-based gumbo, cooked dark and slow with chicken thighs, Texas Gulf shrimp, and the holy trinity. Made for rice. The small comes in two containers (~4 servings), the large in four (~8).", "reheat": "The minimum batch size is the Large, so the Small option is only available when splitting a Large between orders. Uncooked rice included.", "contains": "Gluten (flour), Shellfish (shrimp).", "bagged": false, "pairings": [{"id": "abita_amber", "drink": "Abita Amber", "why": "the New Orleans table beer; caramel malt under a dark roux"}, {"id": "riesling", "drink": "Off-dry Riesling", "why": "a little sweetness against the cayenne, acid against the roux"}, {"id": "sweet_tea", "drink": "Sweet tea", "why": "the Louisiana default, and the sugar cools the heat"}, {"id": "chenin_blanc", "drink": "Chenin Blanc", "why": "honeyed body that stands up to a dark roux where lighter whites drown"}, {"id": "chicory_coffee", "drink": "Chicory coffee, after", "why": "the New Orleans finish more than a pairing; the roasted bitterness echoes the roux"}]}, "Texas Gulf Shrimp or Tofu and Chinese Broccoli": {"desc": "Chinese broccoli (gai lan) and your choice of Texas Gulf shrimp or tofu in a savory sauce of garlic, soy, and oyster sauce with a hit of house chili oil. Clean and a little spicy. Chili oil can be omitted upon request. Not recommended...but we get it.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.", "contains": "Shellfish (oyster sauce is in the base, plus shrimp if ordering shrimp) - the tofu version is NOT shellfish-free. Soy (soy sauce, and tofu if ordering tofu). Gluten (soy sauce). Sesame (house chili oil).", "bagged": true, "pairings": [{"id": "jasmine_tea", "drink": "Jasmine tea", "why": "light and floral over Gulf shrimp and greens"}, {"id": "albarino", "drink": "Albariño", "why": "the shrimp wine; salt air acid for a salt-air protein"}, {"id": "lager", "drink": "Crisp lager", "why": "cold and clean against oyster sauce"}, {"id": "sparkling_water", "drink": "Sparkling water with lime", "why": "the dish is clean; the drink can be too"}, {"id": "green_tea", "drink": "Iced green tea", "why": "grassy against the gai lan's bitterness"}]}, "Bo Ssam": {"desc": "Korean-style pork shoulder, dry-brined 24 hours in a 50/50 salt and sugar mix, then roasted low and slow until tender and lightly crisped on the outside. Served with ginger scallion sauce and a side of kimchi. You cook the rice — also great as lettuce wraps if you want to go that route (lettuce not included).", "reheat": "The pork comes pre-pulled and sealed in a bag — bring a pot of water to a gentle simmer and place the sealed bag in until heated through. The ginger scallion sauce and kimchi are ready straight from the fridge, no reheating needed. Cook the rice fresh.", "contains": "Soy, Gluten (soy sauce). Kimchi may contain Fish or Shellfish depending on brand — ask if you have concerns.", "bagged": true, "pairings": [{"id": "makgeolli", "drink": "Makgeolli", "why": "the traditional table answer: milky, lightly fizzy rice wine whose sweetness cuts the pork"}, {"id": "barley_tea", "drink": "Boricha (barley tea)", "why": "the non-alcoholic Korean standard, served cold; what the table drinks when nobody's drinking"}, {"id": "bokbunja", "drink": "Bokbunja (black raspberry wine)", "why": "the pairing Koreans specifically name for bossam; clean sweetness against boiled pork"}, {"id": "lager", "drink": "Crisp lager", "why": "the pragmatic answer; the wrap is salty, fatty, and spicy, and beer resets it"}, {"id": "sparkling_water", "drink": "Sparkling water with yuzu or lime", "why": "the fat and the saeu-jeot want bubbles and acid more than flavor"}]}, "Cumin Mushroom Noodles / Cumin Beef or Lamb on Rice": {"desc": "The same cumin-chili sauce three ways: hand-pulled-style noodles with hard-seared mushrooms doing the heavy lifting where meat usually would, ground beef over rice for a heartier, meat-forward take, or ground lamb over rice, which is actually what this dish is built on. Savory, slightly numbing, and satisfying every way. Worth knowing on the noodle version: mushrooms shrink a lot as they cook so it takes noticeably more of them by weight to do the job, and the fresh noodles cost more than the rice that comes with the beef or lamb version, which is why it's priced closer to the lamb than the beef.", "reheat": "Noodles and sauce travel separately — cook the noodles fresh and toss with the warmed sauce. If you order the beef or lamb over rice version, cook the included rice fresh and warm the meat with the sauce on the stove.", "contains": "Gluten (Shaoxing wine in every version, plus noodles on the noodle version), Soy (soy sauce), Sesame (house chili oil).", "spice": "Spice level is about a 2-3 out of 5 and can't be dialed down — a large portion of the sauce is chili oil.", "bagged": false, "pairings": [{"id": "suanmeitang", "drink": "Suanmeitang (sour plum drink)", "why": "the Chinese street answer to cumin and chile; sour, smoky, cold"}, {"id": "jasmine_tea", "drink": "Jasmine tea", "why": "the default at the table this dish comes from"}, {"id": "lager", "drink": "Tsingtao or any crisp lager", "why": "cumin-lamb street food drinks beer, full stop"}, {"id": "grenache", "drink": "Grenache or Syrah", "why": "the wine that likes cumin; peppery fruit against peppery meat"}, {"id": "sparkling_water", "drink": "Sparkling water with lemon", "why": "bubbles and acid where the chile oil lands"}]}, "Stir Fried Long Beans with Ground Pork or Tofu": {"desc": "Blistered long beans and ground pork in a savory sauce built on doubanjiang and garlic, with a little heat and a classic dry-fried texture on the beans. Deeply savory throughout. Available with ground pork or tofu at the same price.", "reheat": "Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.", "contains": "Gluten (soy sauce, doubanjiang), Soy (doubanjiang, tofu if ordering tofu).", "spice": "Spice level is about a 2 out of 5 and can't be dialed down.", "bagged": true, "pairings": [{"id": "jasmine_tea", "drink": "Jasmine tea", "why": "the table answer; the dish is salty-savory and the tea is neither"}, {"id": "lager", "drink": "Tsingtao or any lager", "why": "wok food and cold beer, the oldest pairing there is"}, {"id": "suanmeitang", "drink": "Suanmeitang", "why": "if you got it spicy, the sour plum does the cooling"}, {"id": "rose", "drink": "Dry rosé", "why": "picnic logic: cold, dry, and friendly with pork and ferment"}, {"id": "barley_tea", "drink": "Cold barley tea", "why": "roasty, no sugar, no argument with the wok"}]}, "Pasta with Homegrown Tomato Sauce": {"desc": "A slow-simmered tomato sauce made with homegrown tomatoes, good olive oil, and garlic. Nothing else needs to be there. Seasonal and in limited quantities — only on the menu when the garden says so.", "reheat": "Uncooked pasta included, cook fresh. Warm the sauce gently on the stove.", "contains": "May contain Dairy. Gluten if including pasta.", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. There's a spot for it on the order form.", "bagged": false, "pairings": [{"id": "sangiovese", "drink": "Chianti or any Sangiovese", "why": "tomato's oldest friend; matching acid, cherry fruit"}, {"id": "lambrusco", "drink": "Lambrusco", "why": "chilled sparkling red against a summer sauce"}, {"id": "sparkling_water", "drink": "Sparkling water with basil or lemon", "why": "the sauce is the point; stay out of its way"}, {"id": "pinot_grigio", "drink": "Pinot Grigio", "why": "if white, something that won't argue with acidity"}, {"id": "chinotto", "drink": "Italian chinotto", "why": "bitter citrus soda; the amaro of soft drinks"}]}, "Orecchiette with Bitter Greens and Anchovies": {"desc": "Orecchiette with bitter greens, anchovy, garlic, and good parmesan in an olive-oil sauce, finished with lemon herb butter. This one uses tong ho (chrysanthemum greens), since broccoli rabe is hard to source, and the tong ho brings the same pleasant bitterness. No tomato, no cream, just salt, fat, and depth. The little cupped pasta catches the greens and sauce in every bite. Add a pound of fresh-toasted fennel pork sausage to make it a full dinner.", "reheat": "Comes as a sauce, ready to finish. You cook the pasta fresh — no substitutions on the orecchiette, the dish is built around this pasta.", "contains": "Fish (anchovies), Dairy (parmesan, butter), Gluten (pasta).", "bagged": false, "pairings": [{"id": "vermentino", "drink": "Verdicchio or Vermentino", "why": "coastal Italian whites built for anchovy and bitter greens"}, {"id": "rose", "drink": "Dry rosé", "why": "enough fruit for the chile, enough acid for the greens"}, {"id": "sparkling_water", "drink": "Sparkling water with lemon", "why": "bitterness and salt want bubbles"}, {"id": "falanghina", "drink": "Falanghina", "why": "southern Italian answer to a southern Italian plate"}, {"id": "green_tea", "drink": "Cold vermentino-style iced green tea", "why": "grassy-bitter echo, zero proof"}]}, "Bolognese": {"desc": "A proper Bolognese, cooked low and slow with a soffritto base, a mix of meats, milk, and wine until it's rich and velvety. This is one of the slow-cooked exceptions, and it tastes like the hours that went into it.", "reheat": "Uncooked pasta included, cook fresh — let me know what shape you'd like. Want premium egg pappardelle instead? Select that variant (+$10 small / +$15 large, covers 2 or 3 packs respectively). Warm the sauce gently, adding a splash of pasta water to loosen.", "contains": "Dairy. Gluten if including pasta. Egg if choosing the egg pappardelle option.", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. There's a spot for it on the order form.", "bagged": false, "pairings": [{"id": "lambrusco", "drink": "Lambrusco", "why": "what Bologna actually pours with ragù: dry, sparkling, red, and correct"}, {"id": "sangiovese", "drink": "Sangiovese", "why": "the acid-and-cherry answer if you want a still red"}, {"id": "barbera", "drink": "Barbera", "why": "low tannin, high acid; built for tomato and fat"}, {"id": "aranciata", "drink": "San Pellegrino Aranciata Rossa", "why": "blood orange bitterness as a palate reset, the Italian soda move"}, {"id": "espresso", "drink": "Espresso, after", "why": "not a pairing, a tradition"}]}, "Boeuf Bourguignon (Beef Stew)": {"desc": "Beef chuck braised low and slow in red wine with aromatics until the meat is fork-tender. The sauce is the whole point here: the braising liquid reduces down with the wine, tomato paste, and beef stock into something glossy, deep, and almost syrupy, with a savory backbone that coats every bite. It is what you are really paying for. Comes with carrots and potatoes cooked separately in a sous vide bag — reheat the stew, then add the vegetables right before serving so nothing overcooks. Want mushrooms? Add a pound for $12.", "reheat": "Comes in two parts — the stew in a container and the vegetables in a sous vide bag. Warm the stew gently on the stove over medium-low until the meat is heated through. Reheat the veg bag in simmering water, discard the liquid — it contains butter, so avoid pouring it down the drain — then fold the vegetables into the stew right before serving. Great over mashed potatoes, egg noodles, or crusty bread.", "contains": "Gluten (flour), Dairy (butter, in the vegetable bag).", "spotlight": true, "bagged": false, "pairings": [{"id": "pinot_noir", "drink": "Red Burgundy (Pinot Noir)", "why": "the dish is named for the region; drink what it's made of"}, {"id": "beaujolais", "drink": "Beaujolais (Fleurie or Morgon)", "why": "the lighter Burgundian answer, floral against beef and bacon"}, {"id": "cotes_du_rhone", "drink": "Côtes du Rhône", "why": "if you want more muscle under the sauce"}, {"id": "sparkling_water", "drink": "Sparkling water with a twist", "why": "the stew is wine-dark already; the glass can be quiet"}, {"id": "black_tea", "drink": "Strong black tea", "why": "tannin's zero-proof cousin, and it stands up to the sauce"}]}, "Brunswick Stew": {"desc": "A thick Southern stew with shredded braised chicken thighs, corn, lima beans, and tomato, simmered down until everything melds. Smoked paprika does the heavy lifting on the smoke. Hearty and a little sweet.", "reheat": "Comes in two parts: the stew in a container and the potatoes in a sous vide bag. Warm the stew gently on the stove over medium-low. The potatoes are the easy part here, and they do not need their own pot. Cut the bag open and discard the thyme and the liquid, but not down the drain since there is butter in it. Tip the potatoes straight into the stew and let everything come up to temperature together until heated through.", "contains": "Dairy (butter, in the potato bag).", "bagged": false, "pairings": [{"id": "sweet_tea", "drink": "Sweet iced tea", "why": "the Southern table default for a stew this smoky and sweet"}, {"id": "amber_lager", "drink": "Amber lager", "why": "malt against smoked pork and tomato without adding weight"}, {"id": "zinfandel", "drink": "Zinfandel", "why": "jammy enough for the barbecue register, acid enough for the tomato"}, {"id": "cheerwine", "drink": "Cheerwine", "why": "the Carolina soda logic: cherry sweetness next to smoke"}, {"id": "unsweet_tea", "drink": "Unsweetened iced tea with lemon", "why": "the same table, minus the sugar"}]}, "Chili": {"desc": "A slow-built chili with a real chile backbone and a lot of depth. The kind that makes you wonder what's in it — and there's quite a bit going on under the hood. Rich, meaty, and better the next day.", "reheat": "Comes in a container. Warm gently on the stove over medium.", "contains": "Gluten (soy sauce), Fish (anchovies), Soy, may contain Dairy. This chili contains some unconventional ingredients. If you have specific allergen concerns, always ask before ordering.", "note": "Happy to grab fixings at cost: tortilla chips, cheddar, sour cream, or macaroni. There's a spot for it on the order form. Trust me on the macaroni.", "bagged": false, "pairings": [{"id": "shiner_bock", "drink": "Shiner Bock", "why": "the Texas answer; dark lager sweetness sits under chile heat without fighting it"}, {"id": "zinfandel", "drink": "Zinfandel", "why": "jammy fruit and enough body for beef and dried chiles"}, {"id": "sparkling_water", "drink": "Topo Chico with lime", "why": "mineral bubbles against the fat; also the most Texas zero-proof answer there is"}, {"id": "big_red", "drink": "Big Red", "why": "the Waco soda; barbecue-joint credentials and sugar that genuinely works against capsaicin"}, {"id": "horchata", "drink": "Horchata", "why": "the cooling rice-cinnamon logic Mexico applies to chile heat, and it works on a bowl of red"}]}, "Indian Style Curry": {"desc": "A rotating curry built on a base of toasted whole spices, aromatics, and tomato. Sometimes contains coconut milk depending on the week. Ask what's on deck, it changes based on what's looking good.", "reheat": "Comes in a container. Warm gently on the stove. Uncooked rice included.", "contains": "Dairy (butter). Shellfish (shrimp) if ordering shrimp. May contain Tree Nuts (coconut) depending on the week. Ask for specifics.", "note": "Chickpea version: vegan available upon request, just put it in the notes on the order form. I swap the butter for oil, use vegetable stock, and leave the cream out.", "bagged": false, "pairings": [{"id": "mango_lassi", "drink": "Mango lassi", "why": "the classic cooling answer; dairy and sweetness against spice"}, {"id": "salted_lassi", "drink": "Salted lassi", "why": "the savory version, closer to what the dish would drink at home"}, {"id": "masala_chai", "drink": "Masala chai, after", "why": "the finish; spice echoing spice once the plate is done"}, {"id": "riesling", "drink": "Off-dry Riesling", "why": "the wine that survives spice; sweetness where tannin would burn"}, {"id": "lager", "drink": "Kingfisher or any crisp lager", "why": "cold and neutral; lets the sauce do the talking"}]}, "Tex-Mex Kit": {"desc": "A build-your-own kit with your choice of protein — pulled pork or beef — slow simmered until it falls apart in a citrusy red chile sauce. Comes with refried beans (in a separate bag for easy reheating), pico de gallo, and HEB bakery flour tortillas (10-pack for small, 20-pack for large). Build tacos, bowls, or whatever you're in the mood for. Pairs great with the pickled onion add-on. Need extras like avocados or more tortillas? I can grab them at cost, there's a spot for it on the order form.", "reheat": "Components travel separately with assembly notes. Warm the protein gently before building. Reheat the beans bag in simmering water or microwave sealed.", "contains": "Gluten (flour tortillas). May contain Dairy. Ask for specifics.", "bagged": false, "pairings": [{"id": "lager", "drink": "Mexican lager with lime", "why": "the taqueria answer; crisp, cold, and out of the way"}, {"id": "margarita", "drink": "Margarita on the rocks", "why": "lime and salt are already in the dish's logic; the classic for a reason"}, {"id": "jamaica", "drink": "Agua de jamaica", "why": "hibiscus: tart, cold, and the deepest red on the table"}, {"id": "sparkling_water", "drink": "Topo Chico", "why": "bubbles and minerals to reset between bites"}, {"id": "rose", "drink": "Dry rosé, cold", "why": "the taco truck won't pour it but it works: cold, dry, and friendly with lime and chile"}]}, "Leblanc Inspired Japanese Curry": {"desc": "A rich, slow-braised Japanese curry inspired by Sojiro's Leblanc café. Wagyu london broil, kabocha squash, and carrots in a deeply layered sauce built with red wine, dark chocolate, espresso, apple, and honey. The carrots and kabocha squash come separately in a sous vide bag — reheat the curry, then add the vegetables right before serving to keep everything at its best. Comes with uncooked rice.", "reheat": "Comes in two parts — the curry in a container and the vegetables in a sous vide bag. Warm the curry gently on the stove over medium-low, reheat the veg bag in simmering water, then combine right before serving. Unlike our other sous vide vegetables, discard the bag's sauce rather than using it as a glaze — it contains butter, so avoid pouring it down the drain. Uncooked rice included, cook fresh for best results. Small batch available only when another customer orders the same week — reach out if you have questions.", "contains": "Dairy (butter). Gluten (flour). Fish (fish sauce, Worcestershire).", "bagged": false, "pairings": [{"id": "ramune", "drink": "Ramune or any lightly citrus soda", "why": "the Japanese curry-shop counter answer; bright against a rich brown roux"}, {"id": "barley_tea", "drink": "Cold mugicha (barley tea)", "why": "roasty, unsweetened, and everywhere in Japan; cuts the roux cleanly"}, {"id": "lager", "drink": "Asahi or Sapporo", "why": "the izakaya default; dry lager against a sweet-savory curry"}, {"id": "oolong", "drink": "Oolong tea, iced", "why": "between green and black; enough body for the roux, no sugar"}, {"id": "pinot_noir", "drink": "Pinot Noir", "why": "if wine, something light and fruity; the curry is mild and the roux is sweet"}]}, "Pappardelle with Vegetables and Mint": {"desc": "A lighter, more vibrant take on pasta than you might expect. Wide egg pappardelle in a silky cream sauce built on slow-cooked fennel and bulb onions, brightened with fresh mint, lemon, and white wine — all three working together to lift the dish. Finished with good parmesan, asparagus, and petite peas folded in. Vegetarian. Comes with 1 pack of premium egg pappardelle for the small (~2-3 servings) and 2 packs for the large (~5-6 servings) — this one isn't the same dish without them, so there's no substitution on the pasta.", "reheat": "Sealed in a bag for the best reheat — see the note on bagged dishes. Small batch available only when another customer orders the same week — reach out if you have questions.", "contains": "Dairy (cream, parmesan), Gluten (pasta), Egg (pasta), Soy (lecithin in the sauce).", "note": "Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. There's a spot for it on the order form.", "bagged": true, "pairings": [{"id": "vermentino", "drink": "Vermentino", "why": "herby coastal white for an herby plate"}, {"id": "rose", "drink": "Dry rosé", "why": "spring vegetables, cold pink wine; Provence logic"}, {"id": "elderflower", "drink": "Sparkling elderflower", "why": "floral against mint, gentle against vegetables"}, {"id": "pinot_grigio", "drink": "Pinot Grigio", "why": "neutral and cold; the vegetables lead"}, {"id": "mint_tea", "drink": "Mint iced tea", "why": "the mint in the dish, continued"}]}, "Coriander Lamb Steak over Gigantes Beans": {"desc": "Lamb leg poached low and slow in butter, then seared and laid over silky gigantes beans and leeks. Toasted coriander and preserved lemon do the heavy lifting on flavor. Deep and bright at the same time.", "reheat": "Two parts: the lamb in a sealed bag, and the gigantes beans and leeks together in their own bag. Remove the bone from the lamb so it sears clean, pat it very dry, and sear hard in a blazing-hot pan just until deeply browned on each side. This is a thinner cut, so take it straight from cold to the hot pan, no resting first. Warm the bean and leek bag in simmering water for a few minutes, spoon them onto the plate, then slice the lamb thin over the top.", "contains": "Dairy (butter). Preserved lemon.", "spotlight": true, "bagged": false, "pairings": [{"id": "agiorgitiko", "drink": "Agiorgitiko or any Greek red", "why": "the local answer to lamb and beans; plummy, soft tannin"}, {"id": "syrah", "drink": "Syrah", "why": "pepper-and-lamb logic from the northern Rhône"}, {"id": "mint_tea", "drink": "Mint iced tea", "why": "lamb's oldest herb, cold"}, {"id": "retsina", "drink": "Retsina, if you're brave", "why": "pine resin against coriander seed; the most Greek move available"}, {"id": "sparkling_water", "drink": "Sparkling water with cucumber", "why": "cooling against a rich plate of beans and lamb fat"}]}, "Pork Chop with Kabocha Purée and Charred Broccolini": {"desc": "Two thick-cut boneless pork chops, cooked sous vide so they stay juicy, then seared at home. They go over a brown-butter kabocha purée with charred broccolini. No sauce on this one, just the chop, the squash, and the greens, and it doesn't need much else. Comes with two thick chops to split among four people, so plan on slicing them rather than handing everyone their own. Want the upgraded version? The spotlight swaps in a bone-in rib chop and adds a spiced cider beurre blanc.", "reheat": "Three parts: the pork in a sealed bag, the kabocha purée in a bag, and the broccolini in a bag. Let the pork sit out 30 minutes or more before searing since these are very thick cuts, then pat dry and sear hard on each side in a blazing-hot pan. Reheat the purée and broccolini bags in simmering water until just heated through, and be careful with the broccolini as it can overcook. Plate the purée, slice the chops against the grain and lay them over the top, broccolini alongside. If you have butter in the house, melt a little over the pork and broccolini right before it goes to the table. Not required, but it's the thing the spotlight version's sauce is doing, and it takes ten seconds.", "contains": "Dairy (butter).", "bagged": false, "pairings": [{"id": "riesling", "drink": "Riesling, dry or just off", "why": "pork's wine; acid for the fat, fruit for the squash's sweetness"}, {"id": "hard_cider", "drink": "Hard cider", "why": "orchard logic against a sweet purée and a seared chop"}, {"id": "pinot_noir", "drink": "Pinot Noir", "why": "the red that respects a pork chop"}, {"id": "sparkling_apple", "drink": "Sparkling apple juice", "why": "the cider move, zero proof"}, {"id": "genmaicha", "drink": "Genmaicha, iced", "why": "toasted rice tea against char and squash"}]}, "Bone-In Pork Rib Chop with All the Fixings": {"desc": "Thick-cut bone-in pork rib chop, cooked sous vide so it stays juicy, then seared at home. It goes over a brown-butter kabocha purée with charred broccolini, and the whole thing gets a spiced cider beurre blanc that's the real reason this one costs what it does. The sauce is a slow-built cider reduction mounted with a lot of good butter and warm spices, and it's what turns a pork chop into something you'd order out. Comfort food that eats like a restaurant. If the sauce isn't what you're after, the regular Pork Chop with Kabocha Purée and Charred Broccolini covers the same ground for less.", "reheat": "Four parts: the pork in a sealed bag, the kabocha purée in a bag, the broccolini in a bag, and the spiced cider beurre blanc in a container. Let the pork sit out 30+ minutes before searing (it's a very thick cut), then pat dry and sear hard on each side in a blazing-hot pan. Reheat the purée and broccolini bags in simmering water until just heated through, and be careful with the broccolini as it can overcook. Warm the sauce gently over low heat; it's stabilized to survive a home reheat, so you have some room, just don't rush it. Plate the purée, lay the pork on one side, broccolini on the other, and drizzle the sauce over all of it.", "contains": "Dairy (butter, cream). Soy (lecithin in the sauce).", "spotlight": true, "bagged": false, "pairings": [{"id": "hard_cider", "drink": "Hard apple cider", "why": "pork and apples; the oldest pairing logic in the northern hemisphere"}, {"id": "riesling", "drink": "Riesling", "why": "cuts fat, flatters pork, handles whatever the fixings are"}, {"id": "amber_ale", "drink": "Amber ale", "why": "malt against a big seared chop"}, {"id": "sparkling_apple", "drink": "Sparkling apple juice", "why": "same orchard, no alcohol"}, {"id": "sweet_tea", "drink": "Sweet iced tea", "why": "the Southern plate's Southern drink"}]}, "Steak au Poivre": {"desc": "The classic French steakhouse move, done right at home. Filet mignon with a peppercorn-cognac cream sauce, over pommes puree (that's fancy talk for mashed potatoes), with jumbo asparagus. This one is cooked to 131F, a perfect medium rare, no exceptions. Fair warning on the price: this is real filet mignon and a sauce built on Courvoisier cognac and a lot of cream, so it costs what a steakhouse plate costs, because that's what it is. Worth it for a special occasion.", "reheat": "Four parts: the filet in a sealed bag, the pommes puree in a bag, the asparagus in a bag, and the peppercorn-cognac \"beurre blanc\" in a container. Let the filet sit out 30 minutes before searing (thick cut), then pat dry and sear hard on each side in a blazing-hot pan, and rest a few minutes. Cooked to 131F, medium rare. Reheat the puree bag in simmering water; the asparagus goes in too but only needs a minute, it overcooks fast. Warm the sauce gently over low heat; it's stabilized to survive a home reheat, so you have some room, just don't rush it. Plate the puree, filet over it, asparagus alongside, sauce over the steak.", "contains": "Dairy (cream, butter). Soy (lecithin in the sauce).", "spotlight": true, "bagged": false, "pairings": [{"id": "syrah", "drink": "Syrah or Côtes du Rhône", "why": "pepper on pepper; the Rhône was built for this sauce"}, {"id": "cabernet", "drink": "Cabernet Sauvignon", "why": "the steakhouse answer; tannin against beef and cream"}, {"id": "cognac", "drink": "Cognac, tiny pour, after", "why": "it's in the sauce; closing the loop is allowed"}, {"id": "sparkling_water", "drink": "Sparkling water, very cold", "why": "between bites of cream and pepper, you want a hard reset"}, {"id": "malbec", "drink": "Malbec", "why": "the value answer that still has the shoulders for it"}]}, "Tea-Smoked Chicken with Dashi Polenta and Alabama White Sauce": {"desc": "Boneless skinless chicken thighs, dry-brined a day, cooked sous vide, then smoked on the stovetop over black tea, rice, and brown sugar. They go over polenta cooked in dashi and finished with brown butter. Finished with a North Alabama White BBQ sauce. Bone-in skin-on chicken available by request. The skin is good but more delicate to work with and can stick to your pan without proper technique, so the default is boneless. Why is the Large such a bargain? One round of smoking ingredients covers either size, so you get the savings.", "reheat": "Two parts: the chicken in a container, the polenta in a sealed bag. Polenta bag into simmering water until hot. The chicken is fully cooked and already smoked, so all it needs is color: pat it very dry, get a pan blazing hot with a neutral oil, and sear hard just until browned. Same treatment as any sous vide protein. Polenta down, chicken over, then the white sauce poured cold across the top. Do not heat the white sauce, it is meant to be cold against the smoke. If you asked for skin-on, do not go blazing hot. Pat it very dry, lay it skin-side down in a moderate pan with a little oil, and let the fat render and the skin tighten before you bring the heat up. Rushing it is how the skin welds itself to the pan.", "contains": "Egg (mayonnaise), Dairy (butter), Fish (bonito in the dashi).", "bagged": false, "pairings": [{"id": "lapsang", "drink": "Lapsang souchong, iced", "why": "the smoke tea; matches the dish's own tea smoke instead of fighting it"}, {"id": "sweet_tea", "drink": "Alabama sweet tea", "why": "the sauce's home tradition; what white-sauce chicken drinks where it's from"}, {"id": "riesling", "drink": "Dry Riesling", "why": "acid and a little fruit against smoke, fat, and horseradish"}, {"id": "amber_ale", "drink": "Amber ale", "why": "smoked-meat logic; malt sweetness under the lacquer"}, {"id": "barley_tea", "drink": "Cold unsweetened barley tea", "why": "echoes the dashi's roasted depth without adding sugar to a plate that has plenty"}]}}, "addons": {"Fresh Cut Pineapple": {"desc": "Freshly cut and ready to eat.", "contains": ""}, "Seasonal Cantaloupe": {"desc": "Seasonal melon, cut and ready to eat. Whatever's best that week goes in the container.", "contains": ""}, "Queso": {"desc": "Slow-developed flavors that put store-bought to shame. Sold by the pint. Freezes very well. Testimonial from a friend: \"This is the best drunk food I've ever had...it literally saved my life.\"", "contains": "Dairy.", "spice": "No Heat, Medium (1 habanero), or Hot (2 habaneros). Extra heat available on request."}, "Pickled Onions or Carrots": {"desc": "Bright, tangy, and the perfect finishing touch on just about anything. Made in-house, packed in a pint mason jar.", "contains": ""}, "Chili Oil": {"desc": "House-made chili oil with five spice, Sichuan peppercorns, toasted sesame, star anise, and fresh ginger. Put it on everything.", "contains": ""}, "Thyme or Lavender Syrup": {"desc": "Simple syrup steeped with fresh thyme or lavender. Perfect for cocktails, lemonade, or sparkling water.", "contains": ""}, "Vanilla Syrup": {"desc": "Rich vanilla syrup made with house-made vanilla extract and vanilla beans. The good stuff.", "contains": ""}, "Vanilla Lavender Syrup": {"desc": "The best of both worlds, vanilla and lavender together. Elegant and versatile.", "contains": ""}, "Chocolate Chip Cookies": {"desc": "Made with two kinds of chocolate for real depth of flavor. Brown butter, molasses, and a touch of patience.", "contains": "Gluten, Dairy, Eggs.", "note": "Yes, the premium ones are expensive. But have you seen chocolate prices lately? That Valrhona is $30 a pound. It's worth it. Best within 2-3 days."}, "Peanut Butter Fudge": {"desc": "Grandma's recipe. That's all you need to know.", "contains": "Dairy, Peanuts."}, "Brownies": {"desc": "Ooey and fudgy. Browned butter, Dutch-processed cocoa, chocolate chips, and a little espresso to deepen it. It's a brownie. A very good one.", "contains": "Gluten, Dairy, Eggs.", "note": "Best within 2-3 days."}}, "static": {"intro": "Everything is cooked ahead and made to reheat at home. A few dishes arrive sealed in a bag because they reheat better that way; the rest come in containers. Order by Sunday for delivery the following Wednesday.", "baggedNote": "A few dishes arrive fully cooked but sealed in a bag instead of a container, not because it's fancy, just because it reheats better. To reheat: bring a separate pot of water to a gentle simmer, drop the bag in, and let it sit a few minutes while you handle everything else, then cut it open and plate. Microwave or stovetop still work fine if you'd rather.", "readyToFinish": "These come cooked ahead and finished by you at home: a quick sear on the proteins, a fast reheat on the vegetables. A few minutes of hands-on work, and the result is worth it.", "readyToFinishFull": "These come cooked ahead and finished by you at home: a quick sear on the proteins, a fast reheat on the veg. Everything is cooked sous vide, sealed in a bag and cooked in a precise temperature-controlled water bath, so it comes out perfectly even edge to edge with no overcooked or raw spots. Your protein arrives already cooked to the ideal point, so all that is left is color and crust.\n\nEvery protein first spends 24 hours in a salt and sugar dry brine, then goes in the bag seasoned with thyme and butter. The salt seasons the meat all the way through instead of just the surface, and the sugar helps it brown, since sous vide never gets hot enough to build a crust on its own. That part is on you and the pan. (Veg get the same salt, sugar, thyme and butter, where the sugar draws out their natural sweetness. Contains dairy.)\n\nTo finish a protein: pat it very dry, get a pan blazing hot with a neutral high-smoke-point oil, and sear hard on each side just until deeply browned. Thicker cuts (ribeye, NY strip, filet, pork tenderloin) do better rested on the counter 15-20 minutes first. Steaks are cooked to 131F medium rare, pork to 140F medium.", "loop": "Return your clean mason jars or meal containers at delivery and save on your next order. Swap or return a mason jar: $2.00 off that item. Return a meal container: $1.00 off your order per container returned. Stack as many as you have. All prices are all-in (tax included).", "whatIsSousVide": "Sous vide (pronounced \"soo veed,\" French for \"under vacuum\") is a cooking method where food is sealed in an airtight bag and cooked in a precisely temperature-controlled water bath. Because the water stays at one exact temperature the whole time, the food cooks perfectly and evenly all the way through, with no overcooked edges and no undercooked center. For this menu, that means your protein arrives already cooked to the perfect point, and all you have to do is add a quick sear for color and crust, or a fast reheat for vegetables.", "bagNote": "All bags used for these items are BPA-free and food-safe for sous vide cooking and freezer storage. Once you're done, feel free to toss them. Trying to cut down on single-use plastic? There's a reusable option for regulars, so ask about it.", "seasoningNote": "Every bag, proteins and vegetables alike, is seasoned with salt, sugar, fresh thyme, and butter before cooking. The sugar isn't there to make things sweet. On the proteins it works with the salt to form a light dry brine that helps them hold moisture and brown better, and on the vegetables it draws out their natural sweetness. Contains: Dairy (butter).", "finishingProtein": "Remove the protein from the bag and pat it very dry with a paper towel — this is the key to a great crust. Get a pan blazing hot with a neutral, high-smoke-point oil, then sear hard on each side just until deeply browned. Thicker cuts (ribeye, NY strip, filet, pork tenderloin) benefit from sitting out on the counter for 15-20 minutes before searing. All steaks are cooked to 131°F (medium rare), pork tenderloin to 140°F (medium).", "finishingVeg": "Place the sealed bag in a pot of simmering water for a few minutes to reheat. Once warmed through, carefully cut the bag open and pour out the liquid. Either plate the vegetables as-is, or pour that liquid into a small pan and reduce it into a glaze, then spoon it back over.", "butterAdd": "Any sous vide protein can come with a container of whipped lemon, garlic, and herb butter to melt over the top right after searing. Highly recommended on the steaks and the pork. + $2.00 per container.", "sousVideVeg": "Fresh vegetables sealed in the bag with butter, salt, sugar, and thyme, then cooked sous vide at precise temperatures until perfectly tender. Reheat in simmering water in the sealed bag, then plate. All vegetables come with 2 servings per bag. Single-serving portions available by request.", "saucesNote": "All sauces come in 2oz containers. We recommend 1-2 containers per 2 servings depending on how saucy you like it.", "dryBrineNote": "Every sous vide protein spends 24 hours in a salt and sugar dry brine before it goes in the bag. This isn't optional and it isn't a garnish step, it's what makes the whole method work. The salt draws moisture out initially, then that moisture gets reabsorbed along with the salt, seasoning the meat all the way through instead of just the surface. The sugar helps with browning later, since sous vide never gets the meat hot enough on its own to develop real color or crust. That's on you and the pan. The result: better seasoning depth than a quick pre-cook salt would give you, and a better sear once you get it in a hot pan at home, because the surface is drier and takes color faster."}, "bag": {"Ribeye": {"desc": "The well-marbled one. All that fat means it stays rich and tender even after a quick sear at home.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan with a neutral oil. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "NY Strip": {"desc": "The classic steakhouse cut. Leaner than a ribeye but still plenty beefy, with a good firm chew.", "reheat": "Pat very dry, then sear hard on each side in a blazing-hot pan with a neutral oil. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F, medium rare.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Filet Mignon": {"desc": "The most tender cut there is. Mild and buttery, so it leans on the sear and seasoning for flavor.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Pork Tenderloin": {"desc": "Lean, mild, and quick to cook, the tenderloin takes really well to a hard sear. Cooked to a perfect 140°F medium so it stays juicy, not dried out the way pork usually ends up. Sold per loin, about 1.25 pounds each. Feeds 2-3.", "reheat": "Pat very dry, sear hard on each side in a blazing-hot pan. Cooked to 140°F (medium), in its own batch separate from the steaks.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Carrots": {"desc": "Sweet, tender carrots, seasoned and ready to glaze. Two servings per bag.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "note": "Single-serving portions available by request.", "isSousVideVeg": true}, "Baby Gold Potatoes": {"desc": "Tender baby gold potatoes, seasoned and ready to glaze. Two servings per bag.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "note": "Single-serving portions available by request.", "isSousVideVeg": true}, "Corn (off the cob)": {"desc": "Sweet corn cut off the cob, cooked sous vide until tender. Three ears per bag, about two servings.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pick out the thyme sprigs, and plate as-is. The corn soaks up all the seasoning, so there's nothing to drain.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "isSousVideVeg": true}, "Parsnips": {"desc": "Sweet, nutty root vegetable — similar to a carrot but earthier and more complex. Excellent glazed.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open and plate as-is, or reduce the liquid into a glaze.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "isSousVideVeg": true}, "Asparagus": {"desc": "Fresh asparagus cooked sous vide until perfectly tender. Available whole or cut into bite-size pieces at the same price — just select your preference.", "reheat": "Place the sealed bag in simmering water, but go easy here. Asparagus overcooks fast, so a minute at a simmer is really all it needs. Cut open and drain off the excess liquid, then plate. The liquid contains butter, so avoid pouring it down the drain.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "isSousVideVeg": true}, "Air-Chilled Chicken Breast": {"desc": "Air-chilled chicken breast, cooked sous vide so it's juicy all the way through, then it just needs a quick sear at home for color. Air chilling skips the water bath chilling step used in traditional processing, so the meat isn't holding extra moisture and the chicken flavor comes through a little cleaner and more concentrated. These run smaller too, closer to one breast per person instead of those giant slabs. No more dry, overcooked chicken breast.", "reheat": "Pat very dry, then sear in a hot pan until golden on each side. Thinner than the steaks, so it can go straight from the fridge to the pan.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Flank Steak": {"desc": "Flank steak, cooked low and slow sous vide for the better part of a day to break down every bit of that grain until it slices tender instead of chewy. Big beefy flavor, great for fajitas, bowls, salads, or just sliced thin against the grain and eaten straight off the board. Feeds 2-3 people.", "reheat": "Pat very dry, then sear hard and fast on each side in a blazing-hot pan, you just want color, it's already cooked through. Rest it, then slice thin against the grain. This one really matters, cut it the wrong way and it gets chewy.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Thick-Cut Pork Chop": {"desc": "Thick-cut boneless pork chops, and only thick-cut, because thin ones dry out the second you look at them wrong. Cooked sous vide to a perfect 140°F so they stay juicy and tender the whole way through, then finished with a hard sear at home. Season simple and let the pork do the talking, or hit it with one of the finishing sauces.", "reheat": "Pat very dry, then sear hard on each side in a blazing-hot pan. Cooked to 140°F, medium, so it stays juicy.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": true}, "Kabocha Squash": {"desc": "Sweet, dense kabocha squash, seasoned and tender. Two servings per bag.", "reheat": "Place the sealed bag in simmering water for a few minutes to reheat. Cut open and plate as-is; the squash soaks up all the seasoning, so there's nothing to drain. A drizzle of melted butter over the top right before serving takes it up a notch.", "contains": "Dairy (butter, in seasoning bag).", "bagCharge": false, "note": "Single-serving portions available by request.", "isSousVideVeg": true}, "Garlic Confit": {"desc": "Whole garlic cloves slow-cooked in good olive oil until soft, sweet, and spreadable, with none of the raw bite. Comes as a 6 oz portion with about an ounce of the garlic-infused oil, and that oil is worth keeping too, use it for roasting, dressings, or dipping. Smear the cloves on toast, mash them into potatoes, stir them into pasta or a pan sauce, or melt one over a steak right after searing.", "reheat": "Comes frozen, and it needs to stay frozen until you use it. Garlic stored in oil at room temperature is a botulism risk, so freezing keeps it safe. Thaw it in the fridge and use within 3 days. Do not leave it sitting out at room temperature.", "contains": "None beyond garlic and olive oil.", "isSousVideVeg": true}}, "sauces": {"Chimichurri": {"desc": "Bright and herby — parsley, oregano, garlic, and red wine vinegar.", "contains": "", "pairs": "Ribeye, NY Strip, Filet, Flank Steak, Pork Tenderloin, Thick-Cut Pork Chop, Air-Chilled Chicken Breast, Asparagus", "price": 3}, "Romesco": {"desc": "Roasted red peppers and almonds with garlic, tomato, and olive oil. Rich and slightly smoky.", "contains": "Tree nuts (almonds).", "pairs": "Flank Steak, Air-Chilled Chicken Breast, Pork Tenderloin, Thick-Cut Pork Chop, Asparagus, Carrots, Baby Gold Potatoes, Kabocha Squash", "price": 4}, "Chermoula": {"desc": "A North African herb sauce — cilantro, parsley, lemon, cumin, and paprika. Bright and a little warming.", "contains": "", "pairs": "Air-Chilled Chicken Breast, Thick-Cut Pork Chop, Carrots, Parsnips, Asparagus, Corn, Kabocha Squash", "price": 3}, "Miso Butter Sauce": {"desc": "Butter and white miso at 2:1 with minced garlic, ginger, and black pepper. Rich, savory, subtly funky.", "contains": "Dairy, Soy (miso).", "pairs": "Ribeye, NY Strip, Filet, Flank Steak, Pork Tenderloin, Thick-Cut Pork Chop, Baby Gold Potatoes, Corn, Asparagus, Parsnips, Kabocha Squash", "price": 3}, "Whipped Lemon Garlic Herb Butter": {"desc": "Butter whipped with lemon, roasted garlic, and fresh herbs. Melts over the top right after searing.", "contains": "Dairy.", "pairs": "Ribeye, NY Strip, Filet, Flank Steak, Pork Tenderloin, Thick-Cut Pork Chop, Air-Chilled Chicken Breast, Asparagus, Baby Gold Potatoes, Kabocha Squash", "price": 3}}};

  function money(n){ return "$" + (Math.round(n*100)/100).toFixed(2).replace(/\.00$/,""); }

  function parseServings(label) {
    var m = label.match(/~(\d+)-(\d+)/);
    if (m) return (parseInt(m[1]) + parseInt(m[2])) / 2;
    m = label.match(/~(\d+)/);
    if (m) return parseInt(m[1]);
    return null;
  }
  function fmtLabel(label) {
    if (/~\d/.test(label) && !/serving/.test(label)) {
      return label.replace(/(~[\d]+-?[\d]*)/, '$1 servings');
    }
    return label;
  }
  function perServing(price, label) {
    var s = parseServings(label);
    if (!s || s <= 0) return null;
    return '~$' + (price / s).toFixed(2).replace(/\.00$/, '') + '/serving';
  }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  function lookupCopy(name, kind){
    var pool = kind === "addon" ? LIBRARY.addons : LIBRARY.dinners;
    return pool[name] || null;
  }

  function priceRows(dish, primeDish){
    var html = '<div class="prices">';
    if (dish && dish.perLb) {
      html += '<div class="price-row"><span class="price-label">By weight</span><span class="price-amt">'+money(dish.pricePerLb)+'/lb + $2.00 bag</span></div>';
      // Prime line: renders directly under the regular weight line for the three
      // steaks that offer a Prime grade (NY Strip, Ribeye, Filet).
      if (primeDish && primeDish.perLb) {
        html += '<div class="price-row"><span class="price-label">Prime, by weight</span><span class="price-amt">'+money(primeDish.pricePerLb)+'/lb + $2.00 bag</span></div>';
      }
      if (dish.avgWeightLb) {
        html += '<div class="price-row"><span class="price-label" style="font-size:11px;color:var(--dim);font-style:italic;">Averages approx. '+(+dish.avgWeightLb).toFixed(2).replace(/\.?0+$/,'')+' lb per piece</span></div>';
      }
    } else {
      ((dish && dish.variants)||[]).forEach(function(v){
        var ps = perServing(v.price, v.label);
        html += '<div class="price-row"><span class="price-label">'+esc(fmtLabel(v.label))+'</span><div class="price-right"><span class="price-amt">'+money(v.price)+'</span>'+(ps ? '<span class="price-per-serving">'+ps+'</span>' : '')+'</div></div>';
      });
    }
    return html + '</div>';
  }

  function renderSauce(dish){
    var copy = (LIBRARY.sauces || {})[dish.name] || {};
    var html = '<div class="dish"><div class="dish-name">'+esc(dish.name)+'</div>';
    if (copy.desc) html += '<div class="dish-desc">'+esc(copy.desc)+'</div>';
    if (copy.pairs) html += '<div class="dish-meta">Pairs well with: '+esc(copy.pairs)+'</div>';
    html += priceRows(dish);
    if (copy.contains) html += '<div class="contains">Contains: '+esc(copy.contains)+'</div>';
    return html + '</div>';
  }

  function lookupBagCopy(name){
    return (LIBRARY.bag || {})[name] || null;
  }

  function pairingsHtml(copy){
    var pr = copy && copy.pairings;
    if (!pr || !pr.length) return '';
    var html = '<div class="pairings"><div class="pairings-head">Goes well with</div>';
    for (var i=0;i<pr.length;i++){
      html += '<div class="pairing-row"><b>'+esc(pr[i].drink)+'</b> &mdash; '+esc(pr[i].why)+'</div>';
    }
    return html + '</div>';
  }

  function renderDish(dish, kind, primeDish){
    var copy = kind === 'bag' ? (lookupBagCopy(dish.name) || {}) : (lookupCopy(dish.name, kind) || {});
    var html = '<div class="dish"><div class="dish-name">'+esc(dish.name)+'</div>';
    if (kind === 'dinner') html += dietTagHtml(dish);
    if (copy.desc) html += '<div class="dish-desc">'+esc(copy.desc)+'</div>';
    if (copy.reheat) html += '<div class="dish-meta">'+esc(copy.reheat)+'</div>';
    if (copy.spice) html += '<div class="dish-spice">Spice: '+esc(copy.spice)+'</div>';
    if (copy.note) html += '<div class="dish-note">'+esc(copy.note)+'</div>';
    if (copy.bagCharge) html += '<div class="dish-meta">+ $2.00 per bag for seasoning and packaging</div>';
    html += pairingsHtml(copy);
    html += priceRows(dish, primeDish);
    if (copy.contains) html += '<div class="contains">Contains: '+esc(copy.contains)+'</div>';
    return html + '</div>';
  }

  // ── Dietary filter (veg / pesc), driven by explicit dish.diet tags from the
  // published config — never inferred from ingredients (Kevin swaps meat stock
  // for the veg protein, so recipe text can't be trusted for this).
  var ACTIVE_DIET = null; // null | 'veg' | 'pesc'
  var LAST_CONFIG = null;
  function dietMatch(dish, diet){
    if (!dish || !diet || !dish.diet) return 'none';
    var tag = dish.diet, variants = dish.variants || [];
    function labelsFor(key){
      if (tag[key] === true) return variants.map(function(v){ return v.label; });
      if (Array.isArray(tag[key])) return tag[key];
      return [];
    }
    var qualifying;
    // vegan is a SUBSET of vegetarian, and vegetarian is a subset of what a
    // pescatarian eats, so the wider filters must include the narrower ones or
    // a vegan-only dish would vanish from the Vegetarian view.
    if (diet === 'veg') qualifying = labelsFor('veg').concat(labelsFor('vegan')).concat(labelsFor('veganOnRequest'));
    else if (diet === 'vegan') qualifying = labelsFor('vegan').concat(labelsFor('veganOnRequest'));
    else if (diet === 'pesc') qualifying = labelsFor('veg').concat(labelsFor('vegan')).concat(labelsFor('veganOnRequest')).concat(labelsFor('pesc'));
    else return 'none';
    if (!qualifying.length) return 'none';
    var set = {}; qualifying.forEach(function(l){ set[l] = 1; });
    if (variants.length && variants.every(function(v){ return set[v.label]; })) return 'all';
    return 'some';
  }
  function dietTagHtml(dish){
    if (!ACTIVE_DIET) return '';
    var m = dietMatch(dish, ACTIVE_DIET);
    // A dish that is only vegan ON REQUEST must never read as plainly "Vegan
    // option available" — the default recipe has butter in it.
    if (ACTIVE_DIET === 'vegan' && dish.diet && dish.diet.veganOnRequest && !(dish.diet.vegan)) {
      return '<div class="diet-tag">Vegan on request — note it on the order form</div>';
    }
    if (m === 'some') {
      var word = ACTIVE_DIET === 'veg' ? 'Vegetarian' : ACTIVE_DIET === 'vegan' ? 'Vegan' : 'Pescatarian';
      return '<div class="diet-tag">' + word + ' option available</div>';
    }
    return '';
  }
  function setDiet(diet){
    ACTIVE_DIET = (ACTIVE_DIET === diet) ? null : diet;
    if (LAST_CONFIG) render(LAST_CONFIG);
  }
  function dietChips(){
    function chip(diet, label){
      var on = ACTIVE_DIET === diet;
      return '<button class="diet-chip' + (on ? ' on' : '') + '" onclick="setDiet(\'' + diet + '\')">' + label + '</button>';
    }
    return '<div class="diet-filter">' +
      '<span class="diet-filter-label">Show:</span>' +
      chip('veg', 'Vegetarian') + chip('vegan', 'Vegan') + chip('pesc', 'Pescatarian') +
      (ACTIVE_DIET ? '<button class="diet-chip clear" onclick="setDiet(\'' + ACTIVE_DIET + '\')">Clear</button>' : '') +
      '</div>';
  }

  function render(config){
    LAST_CONFIG = config;
    if (config.weekLabel) document.getElementById("weekLabel").textContent = config.weekLabel;
    var dishes = config.dishes || [];
    var spotlight = config.spotlight || [];
    var addons = config.addons || [];
    var bag = config.bag || [];

    if (dishes.length === 0 && spotlight.length === 0 && addons.length === 0 && bag.length === 0){
      document.getElementById("content").innerHTML =
        '<div class="empty">No menu is published right now.<br>Check back Wednesday, or reach out directly.</div>';
      return;
    }

    var html = '<div class="intro">'+esc(LIBRARY.static.intro)+'</div>';
    html += dietChips();
    // Optional weekly-special banner: add a `primeBanner` (or rename) string to
    // LIBRARY.static to show it. Dormant when absent. (NY Strip special ended.)
    if (LIBRARY.static.primeBanner) {
      html += '<div class="info-card" style="border-color:var(--gold);"><h4>This Week\'s Special</h4><p>'+esc(LIBRARY.static.primeBanner)+'</p></div>';
    }

    // Diet filter: keep a dish if any orderable variant qualifies (match !== 'none').
    function dietKeep(d){ return !ACTIVE_DIET || dietMatch(d, ACTIVE_DIET) !== 'none'; }
    var dinnersShown = dishes.filter(dietKeep);
    var spotlightShown = spotlight.filter(dietKeep);

    // Dinners
    var anyBagged = false;
    if (dinnersShown.length){
      html += '<div class="section-head">This Week\'s Dinners</div>';
      dinnersShown.forEach(function(d){
        html += renderDish(d, "dinner");
        var copy = lookupCopy(d.name, "dinner");
        if (copy && copy.bagged) anyBagged = true;
      });
    }

    // Spotlight Dinner of the Week — same rendering as dinners, own header.
    // Rendered right after the dinners, before the bagged-dishes note.
    if (spotlightShown.length){
      html += '<div class="section-head">Spotlight Dinner of the Week</div>';
      spotlightShown.forEach(function(d){
        html += renderDish(d, "dinner");
        var scopy = lookupCopy(d.name, "dinner");
        if (scopy && scopy.bagged) anyBagged = true;
      });
    }

    // Bagged-dishes note covers BOTH dinners and spotlight, so it comes after both.
    if (dishes.length || spotlight.length){
      if (anyBagged){
        html += '<div class="info-card"><h4>A Note On Bagged Dishes</h4><p>'+esc(LIBRARY.static.baggedNote)+'</p></div>';
      }
    }

    // Ready to Finish (bag category) — proteins, then vegetables as one consolidated entry
    if (bag.length){
      html += '<div class="section-head">Ready to Finish</div>';
      if (LIBRARY.static.readyToFinishFull) {
        var rf = LIBRARY.static.readyToFinishFull.split('\n\n');
        html += '<div class="info-card">';
        rf.forEach(function(para){ html += '<p>'+esc(para)+'</p>'; });
        html += '</div>';
      } else {
        // Fallback to the old multi-box copy if the consolidated field is absent.
        html += '<div class="info-card"><p>'+esc(LIBRARY.static.readyToFinish)+'</p></div>';
        if (LIBRARY.static.whatIsSousVide) html += '<div class="info-card"><h4>What Is Sous Vide?</h4><p>'+esc(LIBRARY.static.whatIsSousVide)+'</p></div>';
        if (LIBRARY.static.seasoningNote) html += '<div class="info-card"><h4>A Note On Seasoning</h4><p>'+esc(LIBRARY.static.seasoningNote)+'</p></div>';
        if (LIBRARY.static.dryBrineNote) html += '<div class="info-card"><h4>The 24-Hour Dry Brine</h4><p>'+esc(LIBRARY.static.dryBrineNote)+'</p></div>';
        if (LIBRARY.static.finishingProtein) html += '<div class="info-card"><h4>Finishing Your Protein</h4><p>'+esc(LIBRARY.static.finishingProtein)+'</p></div>';
      }
      // Proteins — individual entries. Prime steaks ("X (Prime)") are not shown
      // as their own cards; instead their price is attached as a sub-line under
      // the matching regular steak via renderDish's primeDish argument.
      var proteins = bag.filter(function(d){ var c=lookupBagCopy(d.name); return !c || !c.isSousVideVeg; });
      var primeByBase = {};
      proteins.forEach(function(d){
        var m = /^(.*) - Prime$/.exec(d.name);
        if (m) primeByBase[m[1]] = d;
      });
      proteins.forEach(function(d){
        if (/ - Prime$/.test(d.name)) return; // skip standalone Prime cards
        html += renderDish(d, "bag", primeByBase[d.name]);
      });
      // Sous Vide Vegetables — single consolidated block
      var vegs = bag.filter(function(d){ var c=lookupBagCopy(d.name); return c && c.isSousVideVeg; });
      if (vegs.length){
        html += '<div class="section-sub-head">Sous Vide Vegetables</div>';
        html += '<div class="info-card"><p>'+esc(LIBRARY.static.sousVideVeg)+'</p></div>';
        html += '<div class="dish">';
        vegs.forEach(function(d){
          var vc = lookupBagCopy(d.name) || {};
          html += '<div class="veg-entry">';
          if (d.variants && d.variants.length === 1) {
            // Single variant — name and price on one row
            html += '<div class="price-row"><span class="veg-name">'+esc(d.name)+'</span><div class="price-right"><span class="price-amt">$'+d.variants[0].price+'</span></div></div>';
          } else {
            // Multiple variants (e.g. asparagus whole vs bite-size)
            html += '<div class="veg-name" style="margin-bottom:4px">'+esc(d.name)+'</div>';
            (d.variants||[]).forEach(function(v){
              html += '<div class="price-row"><span class="price-label" style="padding-left:8px">'+esc(v.label)+'</span><div class="price-right"><span class="price-amt">$'+v.price+'</span></div></div>';
            });
          }
          // All sous vide veg are terse (name + price) — that's the compact veg
          // list. Garlic Confit is the one exception: it carries its own
          // description and a storage/safety note (botulism), so show those two
          // lines for confit only.
          if (d.name === 'Garlic Confit') {
            if (vc.desc) html += '<div class="veg-note">'+esc(vc.desc)+'</div>';
            if (vc.reheat) html += '<div class="veg-note" style="margin-top:4px">'+esc(vc.reheat)+'</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }
    }

    // Finishing Sauces — always shown after veg; fall back to library if not yet in config
    var sauces = config.sauces || [];
    var sauceLib = LIBRARY.sauces || {};
    var sauceNames = Object.keys(sauceLib);
    if (sauces.length === 0 && sauceNames.length > 0) {
      sauces = sauceNames.map(function(n){
        return { name: n, variants: [{ label: 'Per Container (2oz)', price: sauceLib[n].price || 3 }] };
      });
    }
    if (sauces.length){
      html += '<div class="section-head">Finishing Sauces</div>';
      html += '<div class="info-card"><p>'+esc(LIBRARY.static.saucesNote)+'</p></div>';
      sauces.forEach(function(d){ html += renderSauce(d); });
    }

    // Fresh Cut Fruit
    var fruit = config.fruit || [];
    if (fruit.length){
      html += '<div class="section-head">Fresh Cut Fruit</div>';
      fruit.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // Desserts
    var desserts = config.desserts || [];
    if (desserts.length){
      html += '<div class="section-head">Desserts</div>';
      desserts.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // Add-ons & Extras
    if (addons.length){
      html += '<div class="section-head">Add-Ons &amp; Extras</div>';
      addons.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // The Loop
    html += '<div class="loop"><h4>The Loop</h4><p>'+esc(LIBRARY.static.loop)+'</p></div>';

    // Order CTA — blocked Mon/Tue
    var day = new Date().getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
    if (day >= 1 && day <= 2) {
      html += '<div class="order-cta" style="background:var(--teal-mid);cursor:default;opacity:0.6;">Ordering opens Wednesday →</div>';
    } else {
      html += '<a class="order-cta" href="form.html">Place Your Order →</a>';
    }
    html += '<a class="pipeline-cta" href="pipeline.html">In the Works — what I\'m testing next →</a>';

    // ── "Want something back?" request block ────────────────────────────────
    // Trust-based, anonymous, same grammar as the pipeline vote. Built from the
    // FULL dinner library so people can ask for dishes that AREN'T on this week.
    // It must read as a REQUEST, not an order — different verb, different color.
    var dinnerKeys = Object.keys((LIBRARY && LIBRARY.dinners) || {}).sort();
    if (dinnerKeys.length) {
      var opts = dinnerKeys.map(function(n){ return '<option value="'+n.replace(/"/g,'&quot;')+'">'+n+'</option>'; }).join('');
      html += '<div class="request-box" id="requestBox">' +
        '<div class="request-head">Want a dish back next week?</div>' +
        '<div class="request-sub">Not an order — just tell me what you\'re hoping to see. No promises, but it helps me plan.</div>' +
        '<select id="requestSelect"><option value="">Pick a dish…</option>' + opts + '</select>' +
        '<input id="requestNote" type="text" maxlength="200" placeholder="Optional note (why, when, etc.)" />' +
        '<button id="requestBtn" type="button">Send request</button>' +
        '<div class="request-done" id="requestDone"></div>' +
        '</div>';
    }

    html += '<div class="footer">Lettuce, Turnip, The Beet · Friends-only meal prep · Austin, TX</div>';

    document.getElementById("content").innerHTML = html;

    // Wire the request button after the DOM is in place.
    var rb = document.getElementById('requestBtn');
    if (rb) {
      rb.addEventListener('click', function(){
        var sel = document.getElementById('requestSelect');
        var note = document.getElementById('requestNote');
        var done = document.getElementById('requestDone');
        var dish = sel ? sel.value : '';
        if (!dish) { done.textContent = 'Pick a dish first.'; done.className = 'request-done err'; return; }
        rb.disabled = true;
        fetch(WORKER + '/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dish: dish, note: note ? note.value : '' }),
        }).then(function(r){
          if (!r.ok) throw new Error('bad');
          done.textContent = 'Got it — thanks. I\'ll take it into account.';
          done.className = 'request-done ok';
          sel.value = ''; if (note) note.value = '';
        }).catch(function(){
          done.textContent = 'Could not send that just now. Try again in a moment.';
          done.className = 'request-done err';
        }).then(function(){ rb.disabled = false; });
      });
    }
  }

  fetch(WORKER + "/config")
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(){
      document.getElementById("content").innerHTML =
        '<div class="empty">Could not load the menu right now.<br>Please try again in a moment.</div>';
    });
</script>
</body>
</html>
