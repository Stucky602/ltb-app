<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#1a1a1a; --teal-dark:#1a3a3a; --teal-mid:#2d6a6a; --teal-light:#3fb8a0;
    --gold:#c9a84c; --cream:#e8e2d4; --card:#232a28; --dim:#9aa5a0; --body:#d8d2c4;
  }
  html,body { background:var(--bg); color:var(--cream); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
  body { max-width:620px; margin:0 auto; padding:max(28px,env(safe-area-inset-top)) 20px max(40px,env(safe-area-inset-bottom)); }
  .logo { width:88px; height:88px; border-radius:50%; display:block; margin:6px auto 12px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .brand { font-size:22px; font-weight:800; color:var(--gold); text-align:center; margin-bottom:2px; }
  .week { font-size:13px; color:var(--teal-light); text-align:center; font-style:italic; margin-bottom:18px; }
  .intro { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.55; color:var(--body); text-align:center; margin-bottom:22px; }
  .section-head { font-size:16px; font-weight:800; color:var(--gold); margin:24px 0 4px; padding-bottom:6px; border-bottom:2px solid var(--teal-mid); }
  .section-sub-head { font-size:14px; font-weight:700; color:var(--teal-light); margin:20px 0 4px; padding-bottom:4px; border-bottom:1px solid var(--teal-mid); }
  .veg-entry { padding:10px 0; border-bottom:1px solid #2d3a36; }
  .veg-entry:last-child { border-bottom:none; }
  .veg-name { font-size:15px; font-weight:600; color:var(--cream); }
  .veg-note { font-size:13px; color:var(--dim); font-style:italic; }
  .dish { padding:16px 0; border-bottom:1px solid #2d3a36; }
  .dish:last-child { border-bottom:none; }
  .dish-name { font-size:17px; font-weight:700; color:var(--cream); margin-bottom:5px; }
  .dish-desc { font-size:13.5px; line-height:1.55; color:var(--body); margin-bottom:8px; }
  .dish-meta { font-size:12px; line-height:1.5; color:var(--dim); font-style:italic; margin-bottom:4px; }
  .dish-spice { font-size:12px; color:#EF9F27; font-weight:600; margin-bottom:4px; }
  .dish-note { font-size:12px; color:var(--teal-light); font-style:italic; margin-bottom:4px; }
  .prices { margin-top:6px; }
  .price-row { display:flex; justify-content:space-between; align-items:flex-start; padding:3px 0; }
  .price-right { display:flex; flex-direction:column; align-items:flex-end; }
  .price-per-serving { font-size:11px; color:var(--dim); font-style:italic; margin-top:1px; }
  .price-label { font-size:13px; color:var(--cream); }
  .price-amt { font-size:14px; font-weight:700; color:var(--gold); white-space:nowrap; padding-left:12px; }
  .contains { font-size:11px; color:#8a928c; margin-top:7px; }
  .info-card { background:var(--card); border:1px solid var(--teal-mid); border-radius:12px; padding:13px 15px; margin:14px 0; }
  .info-card h4 { color:var(--gold); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
  .info-card p { font-size:12.5px; line-height:1.5; color:var(--body); }
  .loop { background:var(--card); border:1px solid var(--gold); border-radius:12px; padding:15px; margin-top:24px; text-align:center; }
  .loop h4 { color:var(--gold); font-size:14px; font-weight:700; margin-bottom:6px; }
  .loop p { font-size:12.5px; line-height:1.55; color:var(--body); }
  .order-cta { display:block; text-align:center; background:var(--teal-light); color:#04342C; font-weight:700; font-size:15px; padding:15px; border-radius:12px; text-decoration:none; margin-top:22px; }
  .footer { margin-top:22px; font-size:11px; color:#6a726c; text-align:center; line-height:1.5; }
  .loading { text-align:center; color:var(--dim); padding:50px 0; font-style:italic; }
  .empty { text-align:center; color:var(--dim); padding:40px 0; font-style:italic; line-height:1.6; }
  .sticky-back { position:fixed; top:max(14px,env(safe-area-inset-top)); left:14px; z-index:999; background:var(--teal-dark); border:1px solid var(--teal-mid); border-radius:10px; padding:8px 14px; color:var(--teal-light); font-size:13px; font-weight:600; text-decoration:none; box-shadow:0 2px 12px rgba(0,0,0,0.4); }
</style>

<script>
  var WORKER = "https://ltb-proxy.strickland-kevinj.workers.dev";
  var LIBRARY = {"_comment":"LTB Dish Library — canonical customer-facing copy. Keyed by exact dish name matching the app's ALL_DINNERS / ALWAYS_MENU names. The menu page and order form both read from the published subset of this. Edit copy here (or via chat) once; it persists forever.","dinners":{"Shrimp or Tofu with Asparagus in Black Bean Sauce":{"desc":"Asparagus and your choice of Texas Gulf shrimp or tofu in a savory sauce of soy, Shaoxing wine, fermented black beans, and aromatics. The fermented black beans give it a deep, funky-in-a-good-way backbone that makes it taste like it came out of a good Cantonese kitchen.","reheat":"Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.","contains":"Shellfish if ordering shrimp. Soy (tofu) if vegetarian. Gluten (soy sauce, Shaoxing wine).","bagged":true},"Thai Basil Chicken (Pad Krapow Gai)":{"desc":"Ground chicken hit hard and fast in the wok with garlic, asparagus, Thai basil, and a sauce of oyster sauce, soy, and fish sauce. Fragrant, savory, and spicy. Spice level is customizable 1-5, just let me know when you order. A fried egg on top is a great move — not included, but highly recommended.","reheat":"Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included, cook fresh for best results.","contains":"Gluten (oyster sauce, soy sauce), Fish (fish sauce), Shellfish (oyster sauce).","bagged":true},"Saffron Pork Ragu":{"desc":"Ground pork slow-cooked with fennel, saffron, sherry, and tomato until it's deep and a little luxurious. The saffron does its quiet thing in the background and the whole thing comes together rich without being heavy.","reheat":"Uncooked pasta included, cook fresh and let me know what pasta you'd like. Also excellent over polenta — order the polenta variant and it comes in a bag, ready to reheat. Want background heat? I can work a little chili into the sauce at no charge, just ask.","contains":"Dairy.","note":"Happy to grab you a block of good parm at cost (about $10-15 extra) to grate fresh over the top. Just ask.","bagged":false},"Mapo Eggplant":{"desc":"Chinese eggplant and ground chicken in a sauce built on doubanjiang and chili oil, cooked down until the eggplant goes silky and soaks up everything around it. Numbing, spicy, and savory all at once. Made for rice.","reheat":"Comes in a container, not a bag. To reheat, warm in a large saucepan over medium, and add a splash of water if it looks a little thick. Uncooked rice included.","contains":"Gluten (soy sauce, doubanjiang), Soy (doubanjiang).","spice":"Spice level is about a 3 out of 5, and this one can't be dialed down.","bagged":false},"Gumbo":{"desc":"A proper roux-based gumbo, cooked dark and slow with chicken thighs, Texas Gulf shrimp, and the holy trinity. Made for rice. The small comes in two containers (~3-6 servings), the large in four (~8-12).","reheat":"The minimum batch size is the Large, so the Small option is only available when splitting a Large between orders. Uncooked rice included.","contains":"Gluten (flour), Shellfish (shrimp).","bagged":false},"Texas Gulf Shrimp or Tofu and Chinese Broccoli":{"desc":"Chinese broccoli (gai lan) and your choice of Texas Gulf shrimp or tofu in a savory sauce of garlic, soy, and oyster sauce with a hit of house chili oil. Clean and a little spicy. Chili oil can be omitted upon request. Not recommended...but we get it.","reheat":"Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.","contains":"Shellfish if ordering shrimp. Soy (tofu) if vegetarian. Gluten (soy sauce).","bagged":true},"Cumin Mushroom Noodles":{"desc":"Hand-pulled-style noodles with hard-seared mushrooms, cumin, and chili in a savory, slightly numbing sauce. Earthy and satisfying, with the mushrooms doing the heavy lifting where meat usually would.","reheat":"Noodles and sauce travel separately. Cook the noodles fresh and toss with the warmed sauce.","contains":"Gluten (noodles, soy sauce), Soy.","spice":"Spice level is about a 2-3 out of 5 and can't be dialed down — a large portion of the sauce is chili oil.","bagged":false},"Stir Fried Long Beans with Ground Pork or Tofu":{"desc":"Blistered long beans and ground pork in a savory sauce built on doubanjiang and garlic, with a little heat and a classic dry-fried texture on the beans. Deeply savory throughout. Available with ground pork or tofu at the same price.","reheat":"Sealed in a bag for the best reheat. See the note on bagged dishes. Uncooked rice included.","contains":"Gluten (soy sauce, doubanjiang), Soy (doubanjiang, tofu if ordering tofu).","spice":"Spice level is about a 2 out of 5 and can't be dialed down.","bagged":true},"Pasta with Homegrown Tomato Sauce":{"desc":"A slow-simmered tomato sauce made with homegrown tomatoes, good olive oil, and garlic. Nothing else needs to be there. Seasonal and in limited quantities — only on the menu when the garden says so.","reheat":"Uncooked pasta included, cook fresh. Warm the sauce gently on the stove.","contains":"May contain Dairy. Gluten if including pasta.","note":"Happy to grab you a block of good parm at cost to grate fresh over the top. Just ask.","bagged":false},"Bolognese":{"desc":"A proper Bolognese, cooked low and slow with a soffritto base, a mix of meats, milk, and wine until it's rich and velvety. This is one of the slow-cooked exceptions, and it tastes like the hours that went into it.","reheat":"Uncooked pasta included, cook fresh — let me know what shape you'd like. Want premium egg pappardelle instead? Select that variant (+$10 small / +$15 large, covers 2 or 3 packs respectively). Warm the sauce gently, adding a splash of pasta water to loosen.","contains":"Dairy. Gluten if including pasta.","note":"Happy to grab you a block of good parm at cost to grate fresh over the top. Just ask.","bagged":false},"Boeuf Bourguignon (Beef Stew)":{"desc":"Beef chuck braised low and slow in red wine with aromatics until the meat is fork-tender and the sauce turns glossy and deep. Comes with carrots and potatoes cooked separately in a sous vide bag — reheat the stew, then add the vegetables right before serving so nothing overcooks. Want mushrooms? Add a pound for $12.","reheat":"Comes in two parts — the stew in a container and the vegetables in a sous vide bag. Warm the stew gently on the stove over medium-low until the meat is heated through. Reheat the veg bag in simmering water, discard the liquid — it contains butter, so avoid pouring it down the drain — then fold the vegetables into the stew right before serving. Great over mashed potatoes, egg noodles, or crusty bread.","contains":"Gluten (flour), may contain Dairy.","bagged":false},"Brunswick Stew":{"desc":"A thick Southern stew with shredded braised chicken thighs, corn, lima beans, and tomato, simmered down until everything melds. Hearty, smoky, and a little sweet.","reheat":"Comes in a container. Warm gently on the stove, adding a splash of water if it looks thick.","contains":"May vary, ask for specifics.","bagged":false},"Chili":{"desc":"A slow-built chili with a real chile backbone and a lot of depth. The kind that makes you wonder what's in it — and there's quite a bit going on under the hood. Rich, meaty, and better the next day.","reheat":"Comes in a container. Warm gently on the stove over medium.","contains":"Gluten (soy sauce), Fish (anchovies), Soy, may contain Dairy. This chili contains some unconventional ingredients. If you have specific allergen concerns, always ask before ordering.","note":"Happy to grab serving additions at cost — tortilla chips, cheddar, sour cream, or macaroni. Trust me on the macaroni.","bagged":false},"Indian Style Curry":{"desc":"A rotating curry built on a base of toasted whole spices, aromatics, and tomato. Sometimes contains coconut milk depending on the week. Ask what's on deck, it changes based on what's looking good.","reheat":"Comes in a container. Warm gently on the stove. Uncooked rice included.","contains":"May contain Dairy, Tree Nuts (coconut). Ask for specifics.","bagged":false},"Tex-Mex Kit":{"desc":"A build-your-own kit with your choice of protein — pulled pork or beef — slow simmered until it falls apart in a citrusy red chile sauce. Comes with refried beans (in a separate bag for easy reheating), pico de gallo, and HEB bakery flour tortillas (10-pack for small, 20-pack for large). Build tacos, bowls, or whatever you're in the mood for. Pairs great with the pickled onion add-on.","reheat":"Components travel separately with assembly notes. Warm the protein gently before building. Reheat the beans bag in simmering water or microwave sealed.","contains":"May contain Dairy, Gluten. Ask for specifics.","bagged":false},"Leblanc Inspired Japanese Curry":{"desc":"A rich, slow-braised Japanese curry inspired by Sojiro's Leblanc café. Wagyu london broil, kabocha squash, and carrots in a deeply layered sauce built with red wine, dark chocolate, espresso, apple, and honey. The carrots and kabocha squash come separately in a sous vide bag — reheat the curry, then add the vegetables right before serving to keep everything at its best. Comes with uncooked rice.","reheat":"Comes in two parts — the curry in a container and the vegetables in a sous vide bag. Warm the curry gently on the stove over medium-low, reheat the veg bag in simmering water, then combine right before serving. Unlike our other sous vide vegetables, discard the bag's sauce rather than using it as a glaze — it contains butter, so avoid pouring it down the drain. Uncooked rice included, cook fresh for best results. Small batch available only when another customer orders the same week — reach out if you have questions.","contains":"May contain Dairy. Gluten (flour).","bagged":false},"Pappardelle with Vegetables and Mint":{"desc":"A lighter, more vibrant take on pasta than you might expect. Wide egg pappardelle in a silky cream sauce built on slow-cooked fennel and bulb onions, brightened with fresh mint, lemon, and white wine — all three working together to lift the dish. Finished with good parmesan, asparagus, and petite peas folded in. Vegetarian. Comes with 1 pack of premium egg pappardelle for the small (~2-3 servings) and 2 packs for the large (~5-6 servings) — this one isn't the same dish without them, so there's no substitution on the pasta.","reheat":"Sealed in a bag for the best reheat — see the note on bagged dishes. Small batch available only when another customer orders the same week — reach out if you have questions.","contains":"Dairy (cream, parmesan), Gluten (pasta), Egg (pasta).","bagged":true}},"addons":{"Fresh Cut Pineapple":{"desc":"Freshly cut and ready to eat.","contains":""},"Seasonal Cantaloupe":{"desc":"Seasonal melon, cut and ready to eat. Whatever's best that week goes in the container.","contains":""},"Queso":{"desc":"Slow-developed flavors that put store-bought to shame. Sold by the pint. Freezes very well. Testimonial from a friend: \"This is the best drunk food I've ever had...it literally saved my life.\"","contains":"Dairy.","spice":"No Heat, Medium (1 habanero), or Hot (2 habaneros). Extra heat available on request."},"Pickled Onions or Carrots":{"desc":"Bright, tangy, and the perfect finishing touch on just about anything. Made in-house, packed in a pint mason jar.","contains":""},"Chili Oil":{"desc":"House-made chili oil with five spice, Sichuan peppercorns, toasted sesame, star anise, and fresh ginger. Put it on everything.","contains":""},"Thyme or Lavender Syrup":{"desc":"Simple syrup steeped with fresh thyme or lavender. Perfect for cocktails, lemonade, or sparkling water.","contains":""},"Vanilla Syrup":{"desc":"Rich vanilla syrup made with house-made vanilla extract and vanilla beans. The good stuff.","contains":""},"Vanilla Lavender Syrup":{"desc":"The best of both worlds, vanilla and lavender together. Elegant and versatile.","contains":""},"Chocolate Chip Cookies":{"desc":"Made with two kinds of chocolate for real depth of flavor. Brown butter, molasses, and a touch of patience.","contains":"Gluten, Dairy, Eggs.","note":"Yes, the premium ones are expensive. But have you seen chocolate prices lately? That Valrhona is $30 a pound. It's worth it."},"Peanut Butter Fudge":{"desc":"Grandma's recipe. That's all you need to know.","contains":"Dairy, Peanuts."}},"static":{"intro":"Everything is cooked ahead and made to reheat at home. A few dishes arrive sealed in a bag because they reheat better that way; the rest come in containers. Order by Sunday for delivery the following Wednesday.","baggedNote":"A few dishes arrive fully cooked but sealed in a bag instead of a container, not because it's fancy, just because it reheats better. To reheat: bring a separate pot of water to a gentle simmer, drop the bag in, and let it sit a few minutes while you handle everything else, then cut it open and plate. Microwave or stovetop still work fine if you'd rather.","readyToFinish":"These come cooked ahead and finished by you at home: a quick sear on the proteins, a fast reheat on the vegetables. A few minutes of hands-on work, and the result is worth it.","loop":"Return your clean mason jars or meal containers at delivery and save on your next order. Swap or return a mason jar: $2.00 off that item. Return a meal container: $1.00 off your order per container returned. Stack as many as you have. All prices are all-in (tax included).","whatIsSousVide":"Sous vide (pronounced \"soo veed,\" French for \"under vacuum\") is a cooking method where food is sealed in an airtight bag and cooked in a precisely temperature-controlled water bath. Because the water stays at one exact temperature the whole time, the food cooks perfectly and evenly all the way through, with no overcooked edges and no undercooked center. For this menu, that means your protein arrives already cooked to the perfect point, and all you have to do is add a quick sear for color and crust, or a fast reheat for vegetables.","bagNote":"All bags used for these items are BPA-free and food-safe for sous vide cooking and freezer storage. Once you're done, feel free to toss them. Trying to cut down on single-use plastic? There's a reusable option for regulars, so ask about it.","seasoningNote":"Every bag, proteins and vegetables alike, is seasoned with salt, sugar, fresh thyme, and butter before cooking. The sugar isn't there to make things sweet. On the proteins it works with the salt to form a light dry brine that helps them hold moisture and brown better, and on the vegetables it draws out their natural sweetness. Contains: Dairy (butter).","finishingProtein":"Remove the protein from the bag and pat it very dry with a paper towel — this is the key to a great crust. Get a pan blazing hot with a neutral, high-smoke-point oil, then sear hard on each side just until deeply browned. Thicker cuts (ribeye, NY strip, filet, pork tenderloin) benefit from sitting out on the counter for 15-20 minutes before searing. All steaks are cooked to 131°F (medium rare), pork tenderloin to 140°F (medium).","finishingVeg":"Place the sealed bag in a pot of simmering water for a few minutes to reheat. Once warmed through, carefully cut the bag open and pour out the liquid. Either plate the vegetables as-is, or pour that liquid into a small pan and reduce it into a glaze, then spoon it back over.","butterAdd":"Any sous vide protein can come with a container of whipped lemon, garlic, and herb butter to melt over the top right after searing. Highly recommended on the steaks and the pork. + $2.00 per container.","sousVideVeg":"Fresh vegetables cooked sous vide at precise temperatures until perfectly tender, then sealed in the bag with butter, salt, sugar, and thyme. Reheat in simmering water in the sealed bag, then plate as-is or reduce the liquid into a glaze. All vegetables come with 2 servings per bag. Single-serving portions available by request.","saucesNote":"All sauces come in 2oz containers. We recommend 1-2 containers per 2 servings depending on how saucy you like it."},"bag":{"Ribeye":{"desc":"The well-marbled one. All that fat means it stays rich and tender even after a quick sear at home.","reheat":"Pat very dry, sear hard on each side in a blazing-hot pan with a neutral oil. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).","contains":"Dairy (butter, in seasoning bag).","bagCharge":true},"NY Strip":{"desc":"Leaner than the ribeye but still plenty beefy. A good middle ground if you want flavor without all the fat.","reheat":"Pat very dry, sear hard on each side in a blazing-hot pan. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).","contains":"Dairy (butter, in seasoning bag).","bagCharge":true},"Filet Mignon":{"desc":"The most tender cut there is. Mild and buttery, so it leans on the sear and seasoning for flavor.","reheat":"Pat very dry, sear hard on each side in a blazing-hot pan. Let it rest 15-20 minutes out of the fridge before searing. Cooked to 131°F (medium rare).","contains":"Dairy (butter, in seasoning bag).","bagCharge":true},"Pork Tenderloin":{"desc":"Lean, mild, and quick to cook, the tenderloin takes really well to a hard sear. Cooked to a perfect 140°F medium so it stays juicy, not dried out the way pork usually ends up. Sold per loin, about 1.25 pounds each.","reheat":"Pat very dry, sear hard on each side in a blazing-hot pan. Cooked to 140°F (medium), in its own batch separate from the steaks.","contains":"Dairy (butter, in seasoning bag).","bagCharge":true},"Chicken Breast":{"desc":"Cooked sous vide so it's actually juicy all the way through, then it just needs a quick sear at home for color. No more dry, overcooked chicken breast.","reheat":"Pat very dry, sear in a hot pan until golden on each side. Thinner than steaks so it can go straight from the fridge to the pan.","contains":"Dairy (butter, in seasoning bag).","bagCharge":true},"Carrots":{"desc":"Sweet, tender carrots, seasoned and ready to glaze. Two servings per bag.","reheat":"Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.","contains":"Dairy (butter, in seasoning bag).","bagCharge":false,"note":"Single-serving portions available by request.","isSousVideVeg":true},"Baby Gold Potatoes":{"desc":"Tender baby gold potatoes, seasoned and ready to glaze. Two servings per bag.","reheat":"Place the sealed bag in simmering water for a few minutes to reheat. Cut open, pour out the liquid, and either plate as-is or reduce the liquid into a glaze and spoon it back over.","contains":"Dairy (butter, in seasoning bag).","bagCharge":false,"note":"Single-serving portions available by request.","isSousVideVeg":true},"Corn (off the cob)":{"desc":"Sweet corn cut off the cob, cooked sous vide until tender. Three ears per bag, about two servings.","reheat":"Place the sealed bag in simmering water for a few minutes to reheat. Cut open and plate as-is, or reduce the liquid into a light glaze.","contains":"Dairy (butter, in seasoning bag).","bagCharge":false,"isSousVideVeg":true},"Parsnips":{"desc":"Sweet, nutty root vegetable — similar to a carrot but earthier and more complex. Excellent glazed.","reheat":"Place the sealed bag in simmering water for a few minutes to reheat. Cut open and plate as-is, or reduce the liquid into a glaze.","contains":"Dairy (butter, in seasoning bag).","bagCharge":false,"isSousVideVeg":true},"Asparagus":{"desc":"Fresh asparagus cooked sous vide until perfectly tender. Available whole or cut into bite-size pieces at the same price — just select your preference.","reheat":"Place the sealed bag in simmering water for a few minutes to reheat. Cut open and plate as-is, or reduce the liquid into a glaze.","contains":"Dairy (butter, in seasoning bag).","bagCharge":false,"isSousVideVeg":true}},"sauces":{"Chimichurri":{"desc":"Bright and herby — parsley, oregano, garlic, and red wine vinegar.","contains":"","pairs":"Ribeye, NY Strip, Filet, Pork Tenderloin, Chicken Breast, Asparagus","price":3},"Romesco":{"desc":"Roasted red peppers and almonds with garlic, tomato, and olive oil. Rich and slightly smoky.","contains":"Tree nuts (almonds).","pairs":"Chicken Breast, Pork Tenderloin, Asparagus, Carrots, Baby Gold Potatoes","price":4},"Chermoula":{"desc":"A North African herb sauce — cilantro, parsley, lemon, cumin, and paprika. Bright and a little warming.","contains":"","pairs":"Chicken Breast, Carrots, Parsnips, Asparagus, Corn","price":3},"Miso Butter Sauce":{"desc":"Butter and white miso at 2:1 with minced garlic, ginger, and black pepper. Rich, savory, subtly funky.","contains":"Dairy, Soy (miso).","pairs":"Ribeye, NY Strip, Filet, Pork Tenderloin, Baby Gold Potatoes, Corn, Asparagus, Parsnips","price":3},"Whipped Lemon Garlic Herb Butter":{"desc":"Butter whipped with lemon, roasted garlic, and fresh herbs. Melts over the top right after searing.","contains":"Dairy.","pairs":"Ribeye, NY Strip, Filet, Pork Tenderloin, Chicken Breast, Asparagus, Baby Gold Potatoes","price":3}}};

  function money(n){ return "$" + (Math.round(n*100)/100).toFixed(2).replace(/\.00$/,""); }

  function parseServings(label) {
    var m = label.match(/~(\d+)-(\d+)/);
    if (m) return (parseInt(m[1]) + parseInt(m[2])) / 2;
    m = label.match(/~(\d+)/);
    if (m) return parseInt(m[1]);
    return null;
  }
  function fmtLabel(label) {
    if (/~\d/.test(label) && !/serving/.test(label)) {
      return label.replace(/(~[\d]+-?[\d]*)/, '$1 servings');
    }
    return label;
  }
  function perServing(price, label) {
    var s = parseServings(label);
    if (!s || s <= 0) return null;
    return '~$' + (price / s).toFixed(2).replace(/\.00$/, '') + '/serving';
  }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  function lookupCopy(name, kind){
    var pool = kind === "addon" ? LIBRARY.addons : LIBRARY.dinners;
    return pool[name] || null;
  }

  function priceRows(dish){
    var html = '<div class="prices">';
    if (dish && dish.perLb) {
      html += '<div class="price-row"><span class="price-label">By weight</span><span class="price-amt">'+money(dish.pricePerLb)+'/lb + $1.50 bag</span></div>';
    } else {
      ((dish && dish.variants)||[]).forEach(function(v){
        var ps = perServing(v.price, v.label);
        html += '<div class="price-row"><span class="price-label">'+esc(fmtLabel(v.label))+'</span><div class="price-right"><span class="price-amt">'+money(v.price)+'</span>'+(ps ? '<span class="price-per-serving">'+ps+'</span>' : '')+'</div></div>';
      });
    }
    return html + '</div>';
  }

  function renderSauce(dish){
    var copy = (LIBRARY.sauces || {})[dish.name] || {};
    var html = '<div class="dish"><div class="dish-name">'+esc(dish.name)+'</div>';
    if (copy.desc) html += '<div class="dish-desc">'+esc(copy.desc)+'</div>';
    if (copy.pairs) html += '<div class="dish-meta">Pairs well with: '+esc(copy.pairs)+'</div>';
    html += priceRows(dish);
    if (copy.contains) html += '<div class="contains">Contains: '+esc(copy.contains)+'</div>';
    return html + '</div>';
  }

  function lookupBagCopy(name){
    return (LIBRARY.bag || {})[name] || null;
  }

  function renderDish(dish, kind){
    var copy = kind === 'bag' ? (lookupBagCopy(dish.name) || {}) : (lookupCopy(dish.name, kind) || {});
    var html = '<div class="dish"><div class="dish-name">'+esc(dish.name)+'</div>';
    if (copy.desc) html += '<div class="dish-desc">'+esc(copy.desc)+'</div>';
    if (copy.reheat) html += '<div class="dish-meta">'+esc(copy.reheat)+'</div>';
    if (copy.spice) html += '<div class="dish-spice">Spice: '+esc(copy.spice)+'</div>';
    if (copy.note) html += '<div class="dish-note">'+esc(copy.note)+'</div>';
    if (copy.bagCharge) html += '<div class="dish-meta">+ $1.50 per bag for seasoning and packaging</div>';
    html += priceRows(dish);
    if (copy.contains) html += '<div class="contains">Contains: '+esc(copy.contains)+'</div>';
    return html + '</div>';
  }

  function render(config){
    if (config.weekLabel) document.getElementById("weekLabel").textContent = config.weekLabel;
    var dishes = config.dishes || [];
    var addons = config.addons || [];
    var bag = config.bag || [];

    if (dishes.length === 0 && addons.length === 0 && bag.length === 0){
      document.getElementById("content").innerHTML =
        '<div class="empty">No menu is published right now.<br>Check back Wednesday, or reach out directly.</div>';
      return;
    }

    var html = '<div class="intro">'+esc(LIBRARY.static.intro)+'</div>';

    // Dinners
    if (dishes.length){
      html += '<div class="section-head">This Week\'s Dinners</div>';
      var anyBagged = false;
      dishes.forEach(function(d){
        html += renderDish(d, "dinner");
        var copy = lookupCopy(d.name, "dinner");
        if (copy && copy.bagged) anyBagged = true;
      });
      if (anyBagged){
        html += '<div class="info-card"><h4>A Note On Bagged Dishes</h4><p>'+esc(LIBRARY.static.baggedNote)+'</p></div>';
      }
    }

    // Ready to Finish (bag category) — proteins, then vegetables as one consolidated entry
    if (bag.length){
      html += '<div class="section-head">Ready to Finish</div>';
      html += '<div class="info-card"><p>'+esc(LIBRARY.static.readyToFinish)+'</p></div>';
      if (LIBRARY.static.whatIsSousVide) html += '<div class="info-card"><h4>What Is Sous Vide?</h4><p>'+esc(LIBRARY.static.whatIsSousVide)+'</p></div>';
      if (LIBRARY.static.seasoningNote) html += '<div class="info-card"><h4>A Note On Seasoning</h4><p>'+esc(LIBRARY.static.seasoningNote)+'</p></div>';
      if (LIBRARY.static.finishingProtein) html += '<div class="info-card"><h4>Finishing Your Protein</h4><p>'+esc(LIBRARY.static.finishingProtein)+'</p></div>';
      // Proteins — individual entries
      var proteins = bag.filter(function(d){ var c=lookupBagCopy(d.name); return !c || !c.isSousVideVeg; });
      proteins.forEach(function(d){ html += renderDish(d, "bag"); });
      // Sous Vide Vegetables — single consolidated block
      var vegs = bag.filter(function(d){ var c=lookupBagCopy(d.name); return c && c.isSousVideVeg; });
      if (vegs.length){
        html += '<div class="section-sub-head">Sous Vide Vegetables</div>';
        html += '<div class="info-card"><p>'+esc(LIBRARY.static.sousVideVeg)+'</p></div>';
        html += '<div class="dish">';
        vegs.forEach(function(d){
          html += '<div class="veg-entry">';
          if (d.variants && d.variants.length === 1) {
            // Single variant — name and price on one row
            html += '<div class="price-row"><span class="veg-name">'+esc(d.name)+'</span><div class="price-right"><span class="price-amt">$'+d.variants[0].price+'</span></div></div>';
          } else {
            // Multiple variants (e.g. asparagus whole vs bite-size)
            html += '<div class="veg-name" style="margin-bottom:4px">'+esc(d.name)+'</div>';
            (d.variants||[]).forEach(function(v){
              html += '<div class="price-row"><span class="price-label" style="padding-left:8px">'+esc(v.label)+'</span><div class="price-right"><span class="price-amt">$'+v.price+'</span></div></div>';
            });
          }
          html += '</div>';
        });
        html += '</div>';
      }
    }

    // Finishing Sauces — always shown after veg; fall back to library if not yet in config
    var sauces = config.sauces || [];
    var sauceLib = LIBRARY.sauces || {};
    var sauceNames = Object.keys(sauceLib);
    if (sauces.length === 0 && sauceNames.length > 0) {
      sauces = sauceNames.map(function(n){
        return { name: n, variants: [{ label: 'Per Container (2oz)', price: sauceLib[n].price || 3 }] };
      });
    }
    if (sauces.length){
      html += '<div class="section-head">Finishing Sauces</div>';
      html += '<div class="info-card"><p>'+esc(LIBRARY.static.saucesNote)+'</p></div>';
      sauces.forEach(function(d){ html += renderSauce(d); });
    }

    // Fresh Cut Fruit
    var fruit = config.fruit || [];
    if (fruit.length){
      html += '<div class="section-head">Fresh Cut Fruit</div>';
      fruit.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // Desserts
    var desserts = config.desserts || [];
    if (desserts.length){
      html += '<div class="section-head">Desserts</div>';
      desserts.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // Add-ons & Extras
    if (addons.length){
      html += '<div class="section-head">Add-Ons &amp; Extras</div>';
      addons.forEach(function(d){ html += renderDish(d, "addon"); });
    }

    // The Loop
    html += '<div class="loop"><h4>The Loop</h4><p>'+esc(LIBRARY.static.loop)+'</p></div>';

    // Order CTA — blocked Mon/Tue
    var day = new Date().getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
    if (day >= 1 && day <= 2) {
      html += '<div class="order-cta" style="background:var(--teal-mid);cursor:default;opacity:0.6;">Ordering opens Wednesday →</div>';
    } else {
      html += '<a class="order-cta" href="form.html">Place Your Order →</a>';
    }
    html += '<div class="footer">Lettuce, Turnip, The Beet · Friends-only meal prep · Austin, TX</div>';

    document.getElementById("content").innerHTML = html;
  }

  fetch(WORKER + "/config")
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(){
      document.getElementById("content").innerHTML =
        '<div class="empty">Could not load the menu right now.<br>Please try again in a moment.</div>';
    });
</script>
</body>
</html>
